<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Flick Foot Soccer 4v4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e5e5e5;
    touch-action: none;
    overscroll-behavior: none;
  }
  #app { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
  canvas { display: block; background: #4a8f3c; position: absolute; top: 0; left: 0; }

  /* HUD */
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 8px);
    left: 0;
    right: 0;
    padding: 6px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  #score-box {
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    color: white;
    pointer-events: auto;
  }
  #score-box .home { color: #e63946; }
  #score-box .away { color: #2e5fa8; }
  #score-box .divider { opacity: 0.4; margin: 0 6px; }
  #timer {
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    pointer-events: auto;
  }
  #lobToggle {
    position: fixed;
    right: 14px;
    bottom: 22%; /* near thumb rest — above the natural flick zone */
    width: 72px;
    height: 72px;
    padding: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 1px;
    border: 2px solid rgba(255,255,255,0.3);
    pointer-events: auto;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Generous invisible tap halo so near-misses register */
  #lobToggle::before {
    content: '';
    position: absolute;
    inset: -20px;
  }
  #lobToggle.on {
    background: #ffd84a;
    color: #4a3800;
    border-color: #ffd84a;
    box-shadow: 0 0 18px rgba(255,216,74,0.7);
  }
  /* Countdown overlay */
  #countdown {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: 900;
    color: #ffd84a;
    text-shadow: 0 0 24px rgba(0,0,0,0.8), 0 6px 12px rgba(0,0,0,0.6);
    z-index: 1100;
    pointer-events: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    letter-spacing: 2px;
    display: none;
  }
  #countdown.visible { display: block; }

  /* End-of-match screen */
  #endscreen {
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.94);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 24px;
    z-index: 1200;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-y: auto;
  }
  #endscreen.visible { display: flex; }
  #endscreen h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  #endscreen .result { font-size: 28px; font-weight: 800; margin: 10px 0; }
  #endscreen .result.win { color: #ffd84a; }
  #endscreen .result.lose { color: #ff6b6b; }
  #endscreen .result.draw { color: #4ecdc4; }
  #endscreen .final-score { font-size: 48px; font-weight: 900; margin-bottom: 18px; font-variant-numeric: tabular-nums; }
  #endscreen .final-score .home { color: #e63946; }
  #endscreen .final-score .away { color: #2e5fa8; }
  #endscreen .final-score .dash { color: #888; margin: 0 10px; }
  #endscreen table { border-collapse: collapse; margin: 4px 0 16px; font-size: 13px; width: 94%; max-width: 380px; }
  #endscreen th, #endscreen td { padding: 6px 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
  #endscreen th { color: #aaa; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  #endscreen td.label { text-align: left; color: #aaa; font-weight: 500; font-size: 12px; }
  #endscreen .home-col { color: #e63946; font-weight: 700; }
  #endscreen .away-col { color: #5a8be8; font-weight: 700; }
  #endscreen .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin: 8px 0 6px; }
  #endscreen button {
    background: #4ecdc4;
    color: #0a0a0a;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 6px;
    margin-bottom: 16px;
  }
  #endscreen .history { width: 94%; max-width: 380px; font-size: 12px; }
  #endscreen .history-row { display: flex; justify-content: space-between; padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  #endscreen .history-row .ts { color: #777; flex: 1; }
  #endscreen .history-row .sc { font-variant-numeric: tabular-nums; font-weight: 600; }
  #endscreen .history-empty { color: #555; font-style: italic; text-align: center; padding: 8px; }

  #version-tag {
    position: fixed;
    bottom: 6px;
    right: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    z-index: 2000;
    pointer-events: none;
    font-family: monospace;
  }

  /* Desktop notice */
  #desktop-notice {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    padding: 40px;
    text-align: center;
  }
  #desktop-notice.visible { display: flex; }
  #desktop-notice h2 { font-size: 22px; font-weight: 500; margin-bottom: 12px; }
  #desktop-notice p { font-size: 14px; color: #999; line-height: 1.6; max-width: 420px; margin-bottom: 20px; }
  #desktop-notice button {
    background: #4ecdc4;
    color: #1a1a1a;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="desktop-notice">
  <h2>Mobile version</h2>
  <p>This is a portrait mobile game. On desktop: the left half of the field is the joystick, the right half is your flick zone.</p>
  <button onclick="document.getElementById('desktop-notice').classList.remove('visible')">Play anyway</button>
</div>

<div id="app">
  <canvas id="pitch"></canvas>
  <div id="hud">
    <div id="score-box">
      <span class="home">HOME <span id="scoreHome">0</span></span>
      <span class="divider">—</span>
      <span class="away"><span id="scoreAway">0</span> AWAY</span>
    </div>
    <div id="timer">02:00</div>
  </div>
  <button id="lobToggle">LOB</button>
  <div id="countdown"></div>
  <div id="version-tag">V26</div>
</div>
<div id="endscreen"></div>

<script>
(function() {
  // ============================================================
  // ORIENTATION / DEVICE DETECTION
  // ============================================================
  const desktopNotice = document.getElementById('desktop-notice');
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // Show desktop notice briefly on non-touch
  if (!isTouchDevice) {
    desktopNotice.classList.add('visible');
  }

  // ============================================================
  // CANVAS SETUP (responsive to screen)
  // ============================================================
  const canvas = document.getElementById('pitch');
  const ctx = canvas.getContext('2d');

  // Portrait field — 9:16 aspect matches mobile soccer games (Mini Football,
  // Score! Hero, PES Mobile). Canvas fits the viewport preserving aspect —
  // black bars only appear on very tall or landscape screens.
  let W = 720, H = 1280;
  let canvasScaleX = 1, canvasScaleY = 1;

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const vw = window.innerWidth || document.documentElement.clientWidth;
    const vh = window.innerHeight || document.documentElement.clientHeight;
    const aspect = W / H;

    let displayW, displayH;
    if (vw / vh > aspect) {
      displayH = vh;
      displayW = vh * aspect;
    } else {
      displayW = vw;
      displayH = vw / aspect;
    }

    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.left = ((vw - displayW) / 2) + 'px';
    canvas.style.top = ((vh - displayH) / 2) + 'px';

    canvas.width = Math.max(1, Math.round(displayW * dpr));
    canvas.height = Math.max(1, Math.round(displayH * dpr));

    canvasScaleX = displayW / W;
    canvasScaleY = displayH / H;
    ctx.setTransform(canvasScaleX * dpr, 0, 0, canvasScaleY * dpr, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
  resizeCanvas();
  setTimeout(resizeCanvas, 250);
  setTimeout(resizeCanvas, 1000);

  // ============================================================
  // HUD
  // ============================================================
  const scoreHomeEl = document.getElementById('scoreHome');
  const scoreAwayEl = document.getElementById('scoreAway');
  const timerEl = document.getElementById('timer');
  const lobToggle = document.getElementById('lobToggle');
  const countdownEl = document.getElementById('countdown');
  const endscreenEl = document.getElementById('endscreen');

  // ============================================================
  // PHYSICS / TUNING CONSTANTS
  // ============================================================
  const GOAL_WIDTH = 180, GOAL_DEPTH = 22;
  const PITCH_PAD = 16;
  const goalTopX = W/2 - GOAL_WIDTH/2;
  const goalTopY = 6;
  const goalBotX = W/2 - GOAL_WIDTH/2;
  const goalBotY = H - 6 - GOAL_DEPTH;

  const PLAYER_WALK_MAX = 2.02;
  const PLAYER_SPRINT_MAX = 3.24;
  const PLAYER_ACCEL = 0.175;
  const PLAYER_DECEL = 0.18;

  const STAMINA_MAX = 100;
  const STAMINA_DRAIN = 0.32;
  const STAMINA_REGEN = 0.35;
  const STAMINA_MIN_TO_SPRINT = 8;

  // Ball — grounded: lower peak speed, moderate drag, spin decays fast
  // Ball — realistic weight; hard shots travel meaningfully but don't
  // pinball around the field. More drag = ball decelerates faster.
  const MAX_BALL_PX_PER_FRAME = 8.5;
  const MIN_SHOT_SPEED = 1.5;
  const POWER_SCALE = 0.0036;
  const POWER_BASELINE = 1.55;
  const LINEAR_DRAG = 0.012;
  const QUAD_DRAG = 0.0038;

  const MAX_SPIN = 0.26;
  const MAGNUS_COEFF = 0.022;
  const SPIN_DECAY = 0.982;

  const GRAVITY = 0.36;
  const LOB_LAUNCH_MULT = 0.9; // horizontal velocity mult for lobs — soars farther

  const DRIBBLE_OFFSET = 20;
  const DRIBBLE_SPRING = 0.28;
  const DRIBBLE_DAMPING = 0.72;
  const POSSESSION_RADIUS = 52;

  // ============================================================
  // GAME STATE — 4v4 (3 outfield + keeper each)
  // ============================================================
  // Home = RED (bottom), attacks top goal
  // Away = BLUE (top), attacks bottom goal
  // Player controls Home #10 (striker)

  let players = []; // all player objects
  let userPlayer = null;

  function createPlayer(team, role, x, y) {
    return {
      team, role, // role: 'keeper' | 'defender' | 'mid' | 'striker'
      x, y,
      vx: 0, vy: 0,
      r: 13,
      facing: team === 'home' ? -Math.PI/2 : Math.PI/2,
      kickAnimT: 0, kickAnimDur: 0, kickAnimDir: {x:0,y:-1},
      stamina: STAMINA_MAX,
      isSprinting: false,
      isUser: false,
      stunned: 0,
      homeX: x, homeY: y, // rest position for AI
      targetX: x, targetY: y,
    };
  }

  function setupPlayers() {
    players = [];
    // HOME (red, attacks up)
    players.push(createPlayer('home', 'keeper', W/2, H - 40));
    players.push(createPlayer('home', 'defender', W/2 - 110, H * 0.72));
    players.push(createPlayer('home', 'defender', W/2 + 110, H * 0.72));
    const user = createPlayer('home', 'striker', W/2, H * 0.58);
    user.isUser = true;
    players.push(user);
    userPlayer = user;

    // AWAY (blue, attacks down)
    players.push(createPlayer('away', 'keeper', W/2, 40));
    players.push(createPlayer('away', 'defender', W/2 - 110, H * 0.28));
    players.push(createPlayer('away', 'defender', W/2 + 110, H * 0.28));
    players.push(createPlayer('away', 'striker', W/2, H * 0.42));
  }

  const ball = {
    x: W/2, y: H/2,
    vx: 0, vy: 0,
    z: 0, vz: 0,
    spin: 0, rotation: 0,
    r: 8,
    possessedBy: null, // player object reference
    trail: [],
  };

  let scoreHome = 0, scoreAway = 0;
  let lastScorer = null; // 'home' | 'away' | null — who scored most recently; other team kicks off
  let matchSeconds = 120;

  // ============================================================
  // GAME STATE MACHINE — countdown between plays, end screen on final
  // ============================================================
  let gameState = 'countdown'; // 'countdown' | 'playing' | 'goalPause' | 'ended'
  let countdownFrames = 0;
  const COUNTDOWN_DURATION = 180; // 3 seconds at 60Hz
  let hitstopFrames = 0; // slow-mo duration after tackles for impact feel
  let hitstopAltFrame = false; // toggles each step during hitstop — skip=50% speed

  // Per-match stats
  function emptyTeamStats() {
    return { passes: 0, tackles: 0, shots: 0, shotsOnGoal: 0, goals: 0, possessionFrames: 0 };
  }
  let stats = { home: emptyTeamStats(), away: emptyTeamStats() };

  // Match history — last 10 games, persisted in localStorage
  const MATCH_HISTORY_KEY = 'flickSoccerHistory_v1';
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(MATCH_HISTORY_KEY)) || []; }
    catch (e) { return []; }
  }
  function saveMatchRecord(record) {
    try {
      const hist = loadHistory();
      hist.unshift(record);
      if (hist.length > 10) hist.length = 10;
      localStorage.setItem(MATCH_HISTORY_KEY, JSON.stringify(hist));
    } catch (e) { /* storage disabled, ignore */ }
  }
  let matchStartTime = null;
  let lobMode = false;
  let flickResolved = true;
  let flashMsg = null;
  const particles = [];

  // Smoothed ball position — used by AI for formation/positional targets.
  // Prevents teammates from shuffling on every tiny ball movement. The raw
  // ball.x/y is still used for direct ball-engagement (chasing/pressuring).
  const smoothedBall = { x: W/2, y: H/2 };
  const BALL_SMOOTH = 0.035;

  function setLobMode(on) {
    lobMode = on;
    lobToggle.classList.toggle('on', lobMode);
  }
  lobToggle.addEventListener('click', () => setLobMode(!lobMode));
  lobToggle.addEventListener('touchstart', e => { e.preventDefault(); setLobMode(!lobMode); }, { passive: false });

  // ============================================================
  // INPUT — TOUCH (left joystick, right flick zone)
  // ============================================================
  // Left half of screen = movement joystick (appears where you first touch)
  // Left side also has SPRINT zone (upper-left corner area) — double-tap to sprint
  // Right half = flick zone (pull back, sweep forward)

  const input = {
    // Joystick
    joyActive: false,
    joyStartX: 0, joyStartY: 0,
    joyCurX: 0, joyCurY: 0,
    joyTouchId: null,
    sprintHeld: false, // if joystick pushed hard OR secondary tap

    // Flick
    flickTouchId: null,
    flickState: 'idle', // 'pullback' | 'forward' | 'idle'
    flickPressStart: null,
    flickPullbackApex: null,
    flickPullbackPath: [],
    flickForwardPath: [],
    flickPullbackDir: null,

    // Keyboard fallback (desktop)
    keys: {},
    mouseDown: false,
    mouseX: 0, mouseY: 0,
  };

  // Convert screen coords to game coords
  function screenToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / canvasScaleX,
      y: (clientY - rect.top) / canvasScaleY,
    };
  }

  function isLeftSide(gameX) {
    // Portrait: left half of screen = joystick (left thumb), right half = flick (right thumb)
    return gameX < W * 0.5;
  }

  function handleTouchStart(e) {
    for (const t of e.changedTouches) {
      const g = screenToGame(t.clientX, t.clientY);

      if (isLeftSide(g.x) && !input.joyActive) {
        // Start joystick
        input.joyActive = true;
        input.joyTouchId = t.identifier;
        input.joyStartX = g.x;
        input.joyStartY = g.y;
        input.joyCurX = g.x;
        input.joyCurY = g.y;
      } else if (!isLeftSide(g.x) && input.flickTouchId === null) {
        // Start flick
        input.flickTouchId = t.identifier;
        input.flickState = 'pullback';
        input.flickPressStart = { x: g.x, y: g.y, t: performance.now() };
        input.flickPullbackApex = { x: g.x, y: g.y };
        input.flickPullbackPath = [{ x: g.x, y: g.y, t: performance.now() }];
        input.flickForwardPath = [];
        input.flickPullbackDir = null;
      }
    }
    e.preventDefault();
  }

  function handleTouchMove(e) {
    for (const t of e.changedTouches) {
      const g = screenToGame(t.clientX, t.clientY);
      if (t.identifier === input.joyTouchId) {
        input.joyCurX = g.x;
        input.joyCurY = g.y;
      } else if (t.identifier === input.flickTouchId) {
        updateFlickPath(g.x, g.y);
      }
    }
    e.preventDefault();
  }

  function handleTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === input.joyTouchId) {
        input.joyActive = false;
        input.joyTouchId = null;
      } else if (t.identifier === input.flickTouchId) {
        resolveFlick();
        input.flickTouchId = null;
      }
    }
    e.preventDefault();
  }

  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

  // Desktop keyboard/mouse fallback
  window.addEventListener('keydown', e => {
    input.keys[e.key.toLowerCase()] = true;
    if (e.key === 'Shift') input.keys['shift'] = true;
    if (e.key === ' ') { e.preventDefault(); setLobMode(!lobMode); }
    if (['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    input.keys[e.key.toLowerCase()] = false;
    if (e.key === 'Shift') input.keys['shift'] = false;
  });
  canvas.addEventListener('contextmenu', e => { e.preventDefault(); setLobMode(!lobMode); });

  canvas.addEventListener('mousedown', e => {
    if (e.button === 2) return;
    const g = screenToGame(e.clientX, e.clientY);
    if (!isLeftSide(g.x)) {
      input.mouseDown = true;
      input.flickState = 'pullback';
      input.flickPressStart = { x: g.x, y: g.y, t: performance.now() };
      input.flickPullbackApex = { x: g.x, y: g.y };
      input.flickPullbackPath = [{ x: g.x, y: g.y, t: performance.now() }];
      input.flickForwardPath = [];
      input.flickPullbackDir = null;
    }
  });
  canvas.addEventListener('mousemove', e => {
    const g = screenToGame(e.clientX, e.clientY);
    input.mouseX = g.x; input.mouseY = g.y;
    if (input.mouseDown) updateFlickPath(g.x, g.y);
  });
  window.addEventListener('mouseup', e => {
    if (e.button === 2) return;
    if (input.mouseDown) {
      resolveFlick();
      input.mouseDown = false;
    }
  });

  function updateFlickPath(x, y) {
    const now = performance.now();
    if (input.flickState === 'pullback') {
      input.flickPullbackPath.push({ x, y, t: now });
      const dFromStart = Math.hypot(x - input.flickPressStart.x, y - input.flickPressStart.y);
      const apexDist = Math.hypot(input.flickPullbackApex.x - input.flickPressStart.x, input.flickPullbackApex.y - input.flickPressStart.y);
      if (dFromStart > apexDist) {
        input.flickPullbackApex = { x, y };
      }

      if (apexDist > 14) {
        const backX = input.flickPressStart.x - input.flickPullbackApex.x;
        const backY = input.flickPressStart.y - input.flickPullbackApex.y;
        const backMag = Math.hypot(backX, backY);
        const bdx = backX / backMag, bdy = backY / backMag;
        if (input.flickPullbackPath.length >= 2) {
          const a = input.flickPullbackPath[Math.max(0, input.flickPullbackPath.length - 3)];
          const b = input.flickPullbackPath[input.flickPullbackPath.length - 1];
          const mdx = b.x - a.x, mdy = b.y - a.y;
          const mmag = Math.hypot(mdx, mdy);
          if (mmag > 2.5) {
            const dot = (mdx * bdx + mdy * bdy) / mmag;
            if (dot > 0.2) {
              input.flickPullbackDir = {
                x: (input.flickPullbackApex.x - input.flickPressStart.x) / apexDist,
                y: (input.flickPullbackApex.y - input.flickPressStart.y) / apexDist,
              };
              input.flickState = 'forward';
              input.flickForwardPath = [{ x, y, t: now }];
            }
          }
        }
      }
    } else if (input.flickState === 'forward') {
      input.flickForwardPath.push({ x, y, t: now });
      while (input.flickForwardPath.length > 2 && now - input.flickForwardPath[0].t > 400) input.flickForwardPath.shift();
    }
  }

  function resolveFlick() {
    if (input.flickState === 'forward' && input.flickForwardPath.length >= 2) {
      // Pullback + sweep forward = SHOT (powerful)
      executeKick();
    } else if (input.flickState === 'pullback' && input.flickPressStart && input.flickPullbackPath.length > 0) {
      // Simple forward swipe (no pullback) = PASS (gentler, directional)
      const first = input.flickPressStart;
      const last = input.flickPullbackPath[input.flickPullbackPath.length - 1];
      const dx = last.x - first.x;
      const dy = last.y - first.y;
      const dist = Math.hypot(dx, dy);
      const dt = (last.t - first.t) / 1000;
      if (dist > 16 && dt > 0.02) {
        executePass(dx / dist, dy / dist, dist, dt);
      }
    }
    input.flickState = 'idle';
    input.flickPressStart = null;
    input.flickPullbackPath = [];
    input.flickForwardPath = [];
    input.flickPullbackApex = null;
    input.flickPullbackDir = null;
  }

  // PASS — gentler, targetable kick; used when the player flicks forward
  // without a preceding pullback. Always ground-level (ignores lobMode).
  function executePass(dirX, dirY, swingDist, dt) {
    if (ball.possessedBy !== userPlayer) return;
    const swingSpeed = swingDist / dt;
    // Moderate power, capped well under shot maximum
    const power = Math.min(5.2, 1.6 + swingSpeed * 0.0025);
    if (power < 1.4) return;

    ball.possessedBy = null;
    ball.x = userPlayer.x + dirX * (userPlayer.r + ball.r + 2);
    ball.y = userPlayer.y + dirY * (userPlayer.r + ball.r + 2);
    ball.vx = dirX * power;
    ball.vy = dirY * power;
    ball.vz = 0; ball.z = 0;
    ball.spin = 0;

    flickResolved = false;
    ball._lastKicker = userPlayer;
    ball._kickCooldown = 30;
    ball._isShot = false;
    stats.home.passes++;
    userPlayer.kickAnimT = 0;
    userPlayer.kickAnimDur = 10;
    userPlayer.kickAnimDir = { x: dirX, y: dirY };
    userPlayer.facing = Math.atan2(dirY, dirX);
  }

  // ============================================================
  // KICK EXECUTION
  // ============================================================
  function executeKick() {
    // Coyote-time: accept the kick if the user has possession OR had it within
    // the last ~220ms and the ball is still close, OR the ball is right at the
    // player's feet (within dribble range). Mobile reaction time is imperfect
    // and this prevents "I flicked the exact second I got tackled" dead inputs.
    const hasPossession = ball.possessedBy === userPlayer;
    const now = performance.now();
    const recentlyLost = userPlayer._lastPossessAt && (now - userPlayer._lastPossessAt) < 220;
    const ballNear = !ball.possessedBy &&
      Math.hypot(ball.x - userPlayer.x, ball.y - userPlayer.y) < POSSESSION_RADIUS;
    if (!hasPossession && !(recentlyLost && ballNear) && !ballNear) return;
    if (!input.flickPullbackDir) return;
    if (input.flickForwardPath.length < 2) return;

    // If we're triggering via coyote/ballNear, re-grab possession so the kick math uses the player position
    if (!hasPossession) {
      ball.possessedBy = userPlayer;
      ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0; ball.spin = 0;
    }

    const first = input.flickForwardPath[0];
    const last = input.flickForwardPath[input.flickForwardPath.length - 1];
    const dt = (last.t - first.t) / 1000;
    if (dt < 0.015) return;

    let wx = 0, wy = 0, wsum = 0;
    for (let i = 0; i < input.flickForwardPath.length; i++) {
      const w = i + 1;
      wx += input.flickForwardPath[i].x * w;
      wy += input.flickForwardPath[i].y * w;
      wsum += w;
    }
    const weightedEnd = { x: wx / wsum, y: wy / wsum };
    const dVecX = weightedEnd.x - input.flickPullbackApex.x;
    const dVecY = weightedEnd.y - input.flickPullbackApex.y;
    const dVecM = Math.hypot(dVecX, dVecY);
    if (dVecM < 3) return;
    const dirX = dVecX / dVecM;
    const dirY = dVecY / dVecM;

    const swingDist = Math.hypot(last.x - first.x, last.y - first.y);
    const swingSpeedPerSec = swingDist / dt;
    if (swingDist < 8 || swingSpeedPerSec < 60) return;

    const rawPower = POWER_BASELINE + swingSpeedPerSec * POWER_SCALE;
    const power = Math.min(MAX_BALL_PX_PER_FRAME, Math.max(MIN_SHOT_SPEED, rawPower));

    let totalTurn = 0;
    for (let i = 1; i < input.flickForwardPath.length - 1; i++) {
      const a = input.flickForwardPath[i-1], b = input.flickForwardPath[i], c = input.flickForwardPath[i+1];
      const v1x = b.x - a.x, v1y = b.y - a.y;
      const v2x = c.x - b.x, v2y = c.y - b.y;
      const m1 = Math.hypot(v1x, v1y), m2 = Math.hypot(v2x, v2y);
      if (m1 < 2 || m2 < 2) continue;
      const cross = v1x * v2y - v1y * v2x;
      const dot = v1x * v2x + v1y * v2y;
      totalTurn += Math.atan2(cross, dot);
    }
    let spin = totalTurn * 0.6;
    if (spin > MAX_SPIN) spin = MAX_SPIN;
    if (spin < -MAX_SPIN) spin = -MAX_SPIN;

    // Release ball
    ball.possessedBy = null;
    ball.x = userPlayer.x + dirX * (userPlayer.r + ball.r + 2);
    ball.y = userPlayer.y + dirY * (userPlayer.r + ball.r + 2);

    if (lobMode) {
      const hPower = power * LOB_LAUNCH_MULT;
      ball.vx = dirX * hPower;
      ball.vy = dirY * hPower;
      ball.vz = power;
      ball.z = 0;
      ball.spin = spin * 0.5;
    } else {
      ball.vx = dirX * power;
      ball.vy = dirY * power;
      ball.vz = 0;
      ball.z = 0;
      ball.spin = spin;
    }

    flickResolved = false;
    ball._lastKicker = userPlayer;
    ball._kickCooldown = 30;
    ball._isShot = true; // user kicks count as shots
    stats.home.shots++;
    userPlayer.kickAnimT = 0;
    userPlayer.kickAnimDur = 14;
    userPlayer.kickAnimDir = { x: dirX, y: dirY };
    userPlayer.facing = Math.atan2(dirY, dirX);
  }

  // ============================================================
  // USER PLAYER MOVEMENT
  // ============================================================
  function updateUserPlayer() {
    if (userPlayer.kickAnimT < userPlayer.kickAnimDur) userPlayer.kickAnimT++;
    if (ball.possessedBy === userPlayer) userPlayer._lastPossessAt = performance.now();

    let inX = 0, inY = 0;
    let sprintInput = false;

    if (input.joyActive) {
      const dx = input.joyCurX - input.joyStartX;
      const dy = input.joyCurY - input.joyStartY;
      const mag = Math.hypot(dx, dy);
      const maxReach = 60;
      if (mag > 8) {
        const clampedMag = Math.min(mag, maxReach);
        inX = (dx / mag);
        inY = (dy / mag);
        // Sprint only when joystick pushed hard past ~82% of max reach
        if (mag > maxReach * 0.82) sprintInput = true;
      }
    } else {
      // Keyboard fallback
      if (input.keys['w'] || input.keys['arrowup']) inY -= 1;
      if (input.keys['s'] || input.keys['arrowdown']) inY += 1;
      if (input.keys['a'] || input.keys['arrowleft']) inX -= 1;
      if (input.keys['d'] || input.keys['arrowright']) inX += 1;
      if (input.keys['shift']) sprintInput = true;
    }

    const moving = (inX !== 0 || inY !== 0);

    const wantsSprint = sprintInput && moving && userPlayer.stamina > 0;
    if (wantsSprint && !userPlayer.isSprinting && userPlayer.stamina < STAMINA_MIN_TO_SPRINT) {
      userPlayer.isSprinting = false;
    } else if (wantsSprint) {
      userPlayer.isSprinting = true;
    } else {
      userPlayer.isSprinting = false;
    }

    const maxSpeed = userPlayer.isSprinting ? PLAYER_SPRINT_MAX : PLAYER_WALK_MAX;

    let tvx = 0, tvy = 0;
    if (moving) {
      const m = Math.hypot(inX, inY);
      tvx = (inX / m) * maxSpeed;
      tvy = (inY / m) * maxSpeed;
    }

    const accelRate = moving ? PLAYER_ACCEL : PLAYER_DECEL;
    userPlayer.vx += (tvx - userPlayer.vx) * accelRate;
    userPlayer.vy += (tvy - userPlayer.vy) * accelRate;

    userPlayer.x += userPlayer.vx;
    userPlayer.y += userPlayer.vy;

    const vmag = Math.hypot(userPlayer.vx, userPlayer.vy);
    if (vmag > 0.3) {
      const targetFacing = Math.atan2(userPlayer.vy, userPlayer.vx);
      let delta = targetFacing - userPlayer.facing;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;
      userPlayer.facing += delta * 0.25;
    }

    if (userPlayer.isSprinting) {
      userPlayer.stamina = Math.max(0, userPlayer.stamina - STAMINA_DRAIN);
    } else {
      userPlayer.stamina = Math.min(STAMINA_MAX, userPlayer.stamina + STAMINA_REGEN);
    }

    clampPlayerToField(userPlayer);
  }

  function clampPlayerToField(p) {
    if (p.x < PITCH_PAD + p.r) { p.x = PITCH_PAD + p.r; p.vx = Math.max(0, p.vx); }
    if (p.x > W - PITCH_PAD - p.r) { p.x = W - PITCH_PAD - p.r; p.vx = Math.min(0, p.vx); }
    if (p.y < PITCH_PAD + p.r) { p.y = PITCH_PAD + p.r; p.vy = Math.max(0, p.vy); }
    if (p.y > H - PITCH_PAD - p.r) { p.y = H - PITCH_PAD - p.r; p.vy = Math.min(0, p.vy); }
  }

  // ============================================================
  // AI (teammates + opponents)
  // ============================================================
  function updateAI(p) {
    if (p._tackleCooldown && p._tackleCooldown > 0) p._tackleCooldown--;
    if (p._recentlyGained && p._recentlyGained > 0) p._recentlyGained--;

    if (p.isUser) return;
    if (p.stunned > 0) {
      // Still apply velocity/drag while stunned so a tackle bump actually
      // pushes them out of contact — but don't run any AI logic
      p.stunned--;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.86;
      p.vy *= 0.86;
      clampPlayerToField(p);
      return;
    }

    let tx, ty;
    const isHomeTeam = p.team === 'home';
    const ownGoalY = isHomeTeam ? H - 6 : 6;
    const ownGoalX = W / 2;
    const attackGoalY = isHomeTeam ? 6 : H - 6;

    if (p.role === 'keeper') {
      // Track ball along goal line, biased toward cutting angle
      const goalCenterY = isHomeTeam ? H - 30 : 30;
      const goalLimitL = W/2 - GOAL_WIDTH/2 + p.r + 4;
      const goalLimitR = W/2 + GOAL_WIDTH/2 - p.r - 4;
      tx = Math.max(goalLimitL, Math.min(goalLimitR, ball.x));
      ty = goalCenterY;
      // Rush out if ball is close & in danger zone
      const bdist = Math.hypot(ball.x - p.x, ball.y - p.y);
      if (bdist < 140 && Math.abs(ball.y - ownGoalY) < 200) {
        tx = ball.x;
        ty = ball.y + (isHomeTeam ? -15 : 15);
      }
    } else {
      const ballCarrier = ball.possessedBy;
      const ourPossession = ballCarrier && ballCarrier.team === p.team;
      const forward = isHomeTeam ? -1 : 1;
      const laneSide = p.homeX < W/2 ? -1 : 1;
      const distToBall = Math.hypot(p.x - ball.x, p.y - ball.y);

      // Rank outfield teammates by distance to ball. Rank 0 = closest.
      // Used by the defensive pressure scheme below: ranks 0 and 1 pressure,
      // rank 2 stays back as the last defender.
      const outfielders = players.filter(mm =>
        mm.team === p.team && mm.role !== 'keeper'
      );
      outfielders.sort((a, b) =>
        Math.hypot(a.x - ball.x, a.y - ball.y) -
        Math.hypot(b.x - ball.x, b.y - ball.y)
      );
      const ballRank = outfielders.indexOf(p); // 0, 1, or 2

      let engageBall = false;
      if (!ballCarrier) {
        // Loose ball — top 2 closest go for it
        engageBall = ballRank <= 1;
      } else if (!ourPossession) {
        // Enemy has ball — two-man pressure, one defender held back
        engageBall = ballRank <= 1;
      }
      p._engaging = engageBall;

      if (ourPossession) {
        // OFFENSE: hold position based on SMOOTHED ball
        if (p.role === 'defender') {
          tx = p.homeX;
          ty = smoothedBall.y - forward * 110;
          ty = isHomeTeam ? Math.max(H * 0.52, ty) : Math.min(H * 0.48, ty);
        } else {
          tx = W/2 + laneSide * 130 + Math.sin(performance.now() / 1400 + p.homeX) * 30;
          ty = smoothedBall.y + forward * 180;
          const offsideY = isHomeTeam ? 95 : H - 95;
          ty = isHomeTeam ? Math.max(offsideY, ty) : Math.min(offsideY, ty);
        }
      } else if (ballRank === 0) {
        // CLOSEST: close down the ball, leading by its velocity
        tx = ball.x + ball.vx * 6;
        ty = ball.y + ball.vy * 6;
      } else if (ballRank === 1) {
        if (!ballCarrier) {
          // Loose ball — rank 1 also chases, offset to avoid stacking
          const closest = outfielders[0];
          const offset = closest && closest.x < ball.x ? 25 : -25;
          tx = ball.x + ball.vx * 6 + offset;
          ty = ball.y + ball.vy * 6;
        } else {
          // Enemy has ball — SUPPORT PRESSURE from an angle to cut pass lanes
          const closest = outfielders[0];
          const supportSide = closest && closest.x < ball.x ? 1 : -1;
          tx = ball.x + supportSide * 60;
          ty = ball.y + forward * (-90); // 90 units goal-side
          ty = isHomeTeam ? Math.min(H - 80, ty) : Math.max(80, ty);
        }
      } else {
        // LAST DEFENDER: hold back, own lane, between ball and goal
        if (p.role === 'defender') {
          tx = p.homeX * 0.65 + smoothedBall.x * 0.35;
          ty = (smoothedBall.y + ownGoalY) / 2;
          ty = ty * 0.55 + p.homeY * 0.45;
        } else {
          // Rank 2 striker — hold forward outlet for counters
          tx = W/2 + laneSide * 110;
          ty = smoothedBall.y + forward * 130;
          ty = isHomeTeam ? Math.min(H * 0.45, ty) : Math.max(H * 0.55, ty);
        }
      }
    }

    // Separation — avoid clumping with same-team players. Larger radius +
    // stronger force so teammates don't stack on each other.
    let sepX = 0, sepY = 0;
    for (const other of players) {
      if (other === p) continue;
      if (other.team !== p.team) continue;
      const dx = p.x - other.x, dy = p.y - other.y;
      const d = Math.hypot(dx, dy);
      if (d < 82 && d > 0.01) {
        sepX += (dx / d) * (82 - d) * 0.12;
        sepY += (dy / d) * (82 - d) * 0.12;
      }
    }

    const dx = (tx - p.x) + sepX;
    const dy = (ty - p.y) + sepY;
    const d = Math.hypot(dx, dy);

    // Speed: walk when holding position; sprint when engaging, but only
    // while stamina allows — same mechanic the user has, so AI can't
    // endlessly run the user down.
    let speedLimit = PLAYER_WALK_MAX * 0.90;
    if (p.role === 'keeper') speedLimit = PLAYER_WALK_MAX * 1.14;

    if (p._engaging) {
      // Start sprinting only with enough stamina (matches user's rule)
      if (!p._sprintingAI && p.stamina > STAMINA_MIN_TO_SPRINT) {
        p._sprintingAI = true;
      }
      // Keep sprinting until stamina depleted
      if (p._sprintingAI && p.stamina <= 0) {
        p._sprintingAI = false;
      }
      if (p._sprintingAI) {
        speedLimit = PLAYER_SPRINT_MAX * 1.00;
      }
    } else {
      p._sprintingAI = false;
    }

    if (p._sprintingAI) {
      p.stamina = Math.max(0, p.stamina - STAMINA_DRAIN);
      p.isSprinting = true; // so the visual trail draws
    } else {
      p.stamina = Math.min(STAMINA_MAX, p.stamina + STAMINA_REGEN);
      p.isSprinting = false;
    }

    // Dead zone — don't jitter around the target. Tight when chasing ball,
    // wide when holding a position so players visibly "stand" in their zone.
    const deadZone = p._engaging ? 6 : 32;

    let tvx = 0, tvy = 0;
    if (d > deadZone) {
      tvx = (dx / d) * speedLimit;
      tvy = (dy / d) * speedLimit;
    }

    p.vx += (tvx - p.vx) * 0.13;
    p.vy += (tvy - p.vy) * 0.13;
    p.x += p.vx;
    p.y += p.vy;

    const vmag = Math.hypot(p.vx, p.vy);
    if (vmag > 0.2) {
      const targetFacing = Math.atan2(p.vy, p.vx);
      let delta = targetFacing - p.facing;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;
      p.facing += delta * 0.25;
    }

    clampPlayerToField(p);

    // AI kicks ball if they possess it
    if (ball.possessedBy === p) {
      aiKick(p);
    } else if (p._possessionTime) {
      p._possessionTime = 0;
    }
  }

  function aiKick(p) {
    if (!p._kickCooldown) p._kickCooldown = 0;
    p._possessionTime = (p._possessionTime || 0) + 1;
    if (p._kickCooldown > 0) { p._kickCooldown--; return; }

    const isHomeTeam = p.team === 'home';
    const goalX = W/2;
    const goalY = isHomeTeam ? goalTopY : goalBotY + GOAL_DEPTH;
    const distToGoal = Math.hypot(goalX - p.x, goalY - p.y);

    // FORCED CLEAR: if AI has held ball > 90 frames (~1.5s), boot it forward
    // prevents the ball getting stuck when no good pass/shot exists
    if (p._possessionTime > 90) {
      const dx = goalX - p.x;
      const dy = (isHomeTeam ? goalTopY : goalBotY + GOAL_DEPTH) - p.y;
      const d = Math.hypot(dx, dy) || 1;
      const power = 6 + Math.random() * 1.5;
      ball.possessedBy = null;
      ball.x = p.x + (dx/d) * (p.r + ball.r + 2);
      ball.y = p.y + (dy/d) * (p.r + ball.r + 2);
      ball.vx = (dx/d) * power + (Math.random() - 0.5) * 1.5;
      ball.vy = (dy/d) * power;
      ball.vz = 0; ball.z = 0;
      ball.spin = 0;
      p._kickCooldown = 40;
      p._possessionTime = 0;
      flickResolved = false;
      p.kickAnimT = 0; p.kickAnimDur = 12;
      p.kickAnimDir = { x: dx/d, y: dy/d };
      return;
    }

    // Enemy (away) shoots more aggressively from farther; home AI slightly more eager too
    const shootRange = isHomeTeam ? 320 : 420;
    const shootProb = isHomeTeam ? 0.045 : 0.065;
    if (distToGoal < shootRange && Math.random() < shootProb) {
      const tx = goalX + (Math.random() - 0.5) * (GOAL_WIDTH - 20);
      const ty = goalY;
      const dx = tx - p.x, dy = ty - p.y;
      const d = Math.hypot(dx, dy);
      const power = 7.5 + Math.random() * 1.9;
      ball.possessedBy = null;
      ball.x = p.x + (dx/d) * (p.r + ball.r + 2);
      ball.y = p.y + (dy/d) * (p.r + ball.r + 2);
      ball.vx = (dx/d) * power;
      ball.vy = (dy/d) * power;
      ball.vz = 0; ball.z = 0;
      ball.spin = (Math.random() - 0.5) * 0.3;
      p._kickCooldown = 90;
      p._possessionTime = 0;
      ball._lastKicker = p;
      ball._kickCooldown = 30;
      ball._isShot = true;
      stats[p.team].shots++;
      flickResolved = false;
      p.kickAnimT = 0; p.kickAnimDur = 14;
      p.kickAnimDir = { x: dx/d, y: dy/d };
      return;
    }

    // Pass decision — score candidates by forward progress + openness.
    // Hot-potato: if this AI just won the ball, they pass away much more
    // eagerly (prevents repeated tackle-pong between teams).
    const passProb = (p._recentlyGained && p._recentlyGained > 0) ? 0.18 : 0.055;
    if (Math.random() < passProb) {
      let bestMate = null, bestScore = -Infinity;
      for (const mate of players) {
        if (mate === p || mate.team !== p.team || mate.role === 'keeper') continue;
        const ahead = isHomeTeam ? (p.y - mate.y) : (mate.y - p.y);
        // Allow back-passes but at reduced priority (no hard cutoff)

        // Openness: distance to nearest opponent
        let mateMarkDist = Infinity;
        for (const opp of players) {
          if (opp.team === p.team) continue;
          const od = Math.hypot(opp.x - mate.x, opp.y - mate.y);
          if (od < mateMarkDist) mateMarkDist = od;
        }
        const openness = Math.min(140, mateMarkDist); // cap contribution

        const distPenalty = Math.hypot(mate.x - p.x, mate.y - p.y) * 0.15;
        let score = (ahead >= 0 ? ahead * 0.5 : ahead * 0.2) + openness * 1.1 - distPenalty;
        // Prefer passing to the human player when they're on our team
        if (mate.isUser && isHomeTeam) score += 50;
        // Prefer striker for final ball
        if (mate.role === 'striker') score += 15;

        if (score > bestScore) { bestScore = score; bestMate = mate; }
      }
      if (bestMate) {
        const dx = bestMate.x - p.x, dy = bestMate.y - p.y;
        const d = Math.hypot(dx, dy);
        // Lead the pass slightly toward the receiver's velocity
        const leadX = bestMate.vx * 8;
        const leadY = bestMate.vy * 8;
        const ldx = dx + leadX, ldy = dy + leadY;
        const ld = Math.hypot(ldx, ldy);
        // Pass power — tuned so the ball arrives under the 8-unit pickup
        // threshold after drag, so the receiver actually traps it instead
        // of having it bounce off them
        const power = Math.min(6.0, 2.6 + d * 0.012);
        ball.possessedBy = null;
        ball.x = p.x + (ldx/ld) * (p.r + ball.r + 2);
        ball.y = p.y + (ldy/ld) * (p.r + ball.r + 2);
        ball.vx = (ldx/ld) * power;
        ball.vy = (ldy/ld) * power;
        ball.vz = 0; ball.z = 0;
        ball.spin = 0;
        p._kickCooldown = 60;
        p._possessionTime = 0;
        ball._lastKicker = p;
        ball._kickCooldown = 30;
        ball._isShot = false;
        stats[p.team].passes++;
        flickResolved = false;
        p.kickAnimT = 0; p.kickAnimDur = 12;
        p.kickAnimDir = { x: ldx/ld, y: ldy/ld };
      }
    }
  }

  // ============================================================
  // BALL
  // ============================================================
  // TACKLES — opponent bump steals the ball
  // ============================================================
  // When a player (AI or human) without the ball contacts the opposing
  // player who has it, possession transfers and the previous carrier is
  // shoved back and briefly stunned. Includes a short post-tackle immunity
  // so the ball doesn't instantly flip back on the same contact.
  function handleTackles() {
    const carrier = ball.possessedBy;
    if (!carrier) return;
    if (carrier._tackleImmune && carrier._tackleImmune > 0) {
      carrier._tackleImmune--;
      return;
    }

    for (const p of players) {
      if (p === carrier) continue;
      if (p.team === carrier.team) continue; // only opposing players tackle
      if (p.stunned > 0) continue;
      if (p._tackleCooldown && p._tackleCooldown > 0) continue;

      const dx = carrier.x - p.x;
      const dy = carrier.y - p.y;
      const d = Math.hypot(dx, dy);
      const contactDist = p.r + carrier.r + 14;

      if (d < contactDist) {
        // TACKLE — transfer possession, shove old carrier clear, stun
        const bumpX = d > 0.01 ? -dx / d : 0;
        const bumpY = d > 0.01 ? -dy / d : 0;

        // Immediate position shove so players aren't still overlapping after
        // the transfer (otherwise they tackle back once immunity expires)
        const shoveDist = 18;
        carrier.x += bumpX * shoveDist;
        carrier.y += bumpY * shoveDist;
        clampPlayerToField(carrier);

        // Residual velocity so the bump reads as a push, plus stun
        carrier.vx = bumpX * 3.6;
        carrier.vy = bumpY * 3.6;
        carrier.stunned = 28;

        // Small forward nudge on the tackler for weight
        p.vx += -bumpX * 0.8;
        p.vy += -bumpY * 0.8;

        // Transfer possession
        ball.possessedBy = p;
        ball.x = p.x + Math.cos(p.facing) * DRIBBLE_OFFSET;
        ball.y = p.y + Math.sin(p.facing) * DRIBBLE_OFFSET;
        ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
        ball.spin = 0;

        // Long immunity so the stunned carrier can't tackle straight back
        p._tackleImmune = 40;
        p._kickCooldown = 0;
        // The tackler can't tackle again for ~0.7s — prevents
        // immediate re-tackle if they've already won the ball
        p._tackleCooldown = 45;
        // "Hot potato" — after winning the ball, this player is biased
        // toward passing quickly instead of dribbling into more pressure
        p._recentlyGained = 90;

        stats[p.team].tackles++;
        hitstopFrames = 18; // ~0.3s of 50% speed slow-mo (feels smooth, not frozen)
        hitstopAltFrame = false;

        if (carrier.isUser || p.isUser) {
          flashText(carrier.isUser ? 'TACKLED!' : 'TACKLE!', '#ff9f40');
        }

        break;
      }
    }
  }

  // ============================================================
  // BALL
  // ============================================================
  function dribbleBall() {
    const carrier = ball.possessedBy;
    if (!carrier) return;

    const vmag = Math.hypot(carrier.vx, carrier.vy);
    const offset = DRIBBLE_OFFSET + vmag * 3;
    const tx = carrier.x + Math.cos(carrier.facing) * offset;
    const ty = carrier.y + Math.sin(carrier.facing) * offset;

    const dx = tx - ball.x;
    const dy = ty - ball.y;
    ball.vx += dx * DRIBBLE_SPRING;
    ball.vy += dy * DRIBBLE_SPRING;
    ball.vx *= DRIBBLE_DAMPING;
    ball.vy *= DRIBBLE_DAMPING;

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.spin = 0;
    ball.trail = [];
    ball.rotation += vmag * 0.2;

    const pd = Math.hypot(ball.x - carrier.x, ball.y - carrier.y);
    if (pd > POSSESSION_RADIUS + 20) {
      ball.possessedBy = null;
      flickResolved = true;
    }
  }

  function updateBall() {
    if (ball.possessedBy) return;

    // Decrement shooter-pickup-cooldown each frame the ball is in flight
    if (ball._kickCooldown && ball._kickCooldown > 0) ball._kickCooldown--;

    ball.trail.push({ x: ball.x, y: ball.y, z: ball.z });
    if (ball.trail.length > 35) ball.trail.shift();

    if (ball.z > 0 || ball.vz > 0) {
      ball.z += ball.vz;
      ball.vz -= GRAVITY;
      if (ball.z <= 0) {
        ball.z = 0;
        ball.vz = -ball.vz * 0.35;
        ball.vx *= 0.9;
        ball.vy *= 0.9;
        if (Math.abs(ball.vz) < 0.4) ball.vz = 0;
      }
    }

    const speed = Math.hypot(ball.vx, ball.vy);
    if (speed > 0.05 && ball.z < 15) {
      const perpX = -ball.vy / speed;
      const perpY = ball.vx / speed;
      const magnusForce = ball.spin * speed * MAGNUS_COEFF;
      ball.vx += perpX * magnusForce;
      ball.vy += perpY * magnusForce;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    const newSpeed = Math.hypot(ball.vx, ball.vy);
    if (newSpeed > 0) {
      const drag = ball.z > 3 ? QUAD_DRAG * newSpeed * 0.5 : LINEAR_DRAG + QUAD_DRAG * newSpeed;
      const newSpeedAfter = Math.max(0, newSpeed - drag);
      const scale = newSpeedAfter / newSpeed;
      ball.vx *= scale;
      ball.vy *= scale;
    }
    ball.spin *= SPIN_DECAY;
    ball.rotation += ball.spin * 0.4 + newSpeed * 0.08;

    // Walls (sides)
    if (ball.x < ball.r + PITCH_PAD) { ball.x = ball.r + PITCH_PAD; ball.vx *= -0.4; ball.spin *= -0.4; }
    if (ball.x > W - ball.r - PITCH_PAD) { ball.x = W - ball.r - PITCH_PAD; ball.vx *= -0.4; ball.spin *= -0.4; }

    // Goal detection (both goals)
    if (!flickResolved) {
      // Top goal (away)
      if (ball.y - ball.r < goalTopY + GOAL_DEPTH && ball.x > goalTopX + 3 && ball.x < goalTopX + GOAL_WIDTH - 3 && ball.z < 50) {
        if (ball.y < goalTopY + GOAL_DEPTH - 2) {
          scoreHome++;
          stats.home.goals++;
          if (ball._isShot && ball._lastKicker && ball._lastKicker.team === 'home') {
            stats.home.shotsOnGoal++;
          }
          lastScorer = 'home';
          scoreHomeEl.textContent = scoreHome;
          flickResolved = true;
          flashText('GOAL!', '#ffd84a');
          spawnConfetti(ball.x, ball.y);
          startGoalPause();
          ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
          return;
        }
      }
      // Bottom goal (home)
      if (ball.y + ball.r > goalBotY && ball.x > goalBotX + 3 && ball.x < goalBotX + GOAL_WIDTH - 3 && ball.z < 50) {
        if (ball.y > goalBotY + 2) {
          scoreAway++;
          stats.away.goals++;
          if (ball._isShot && ball._lastKicker && ball._lastKicker.team === 'away') {
            stats.away.shotsOnGoal++;
          }
          lastScorer = 'away';
          scoreAwayEl.textContent = scoreAway;
          flickResolved = true;
          flashText('CONCEDED', '#ff6b6b');
          startGoalPause();
          ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
          return;
        }
      }
    }

    // Top/bottom walls (outside goal mouth) - sidelines
    if (ball.y < ball.r + PITCH_PAD) {
      const inGoalMouth = ball.x > goalTopX && ball.x < goalTopX + GOAL_WIDTH;
      if (!inGoalMouth) { ball.y = ball.r + PITCH_PAD; ball.vy *= -0.4; }
    }
    if (ball.y > H - ball.r - PITCH_PAD) {
      const inGoalMouth = ball.x > goalBotX && ball.x < goalBotX + GOAL_WIDTH;
      if (!inGoalMouth) { ball.y = H - ball.r - PITCH_PAD; ball.vy *= -0.4; }
    }

    // Ball-player collisions (pickup or deflect)
    for (const p of players) {
      const ddx = ball.x - p.x, ddy = ball.y - p.y;
      const ddist = Math.hypot(ddx, ddy);
      if (ddist < p.r + ball.r && ball.z < 18) {
        if (p.role === 'keeper' && !flickResolved) {
          // Keeper catches — credit the shot as on-target to the shooting team
          if (ball._isShot && ball._lastKicker && ball._lastKicker.team !== p.team) {
            stats[ball._lastKicker.team].shotsOnGoal++;
            ball._isShot = false; // avoid double-counting if it bounces onto keeper again
          }
          ball.vy = -ball.vy * 0.5;
          ball.vx *= 0.4;
          ball.spin *= 0.2;
          flickResolved = true;
          flashText(p.team === 'home' ? 'KEEPER SAVE' : 'SAVED!', '#ffffff');
          continue;
        }
        // Pickup / deflect logic:
        //  - If ball is slow enough to trap, anyone picks it up (includes
        //    passes in flight, not just settled balls) — but the shooter
        //    has a brief cooldown so they don't immediately recapture.
        //  - Faster balls that are still in flight deflect.
        const ballSpeed = Math.hypot(ball.vx, ball.vy);
        const isShooterCooldown = ball._lastKicker === p && (ball._kickCooldown || 0) > 0;
        if (ballSpeed < 5.5 && !isShooterCooldown) {
          ball.possessedBy = p;
          ball.vx = 0; ball.vy = 0; ball.spin = 0;
          flickResolved = true;
          break;
        } else if (!flickResolved) {
          const nx = ddx / ddist, ny = ddy / ddist;
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx -= 2 * dot * nx;
          ball.vy -= 2 * dot * ny;
          ball.vx *= 0.4; ball.vy *= 0.4; // kill more energy on deflect
          p.stunned = 30;
          if (p.team !== userPlayer.team) flashText('BLOCKED', '#ff9f40');
        }
      }
    }

    // Settle — lower threshold so the ball rolls out longer before stopping
    if (Math.hypot(ball.vx, ball.vy) < 0.08 && ball.z < 0.5 && Math.abs(ball.vz) < 0.2) {
      ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
      flickResolved = true;
    }
  }

  function kickoff() {
    ball.x = W/2;
    ball.y = H/2;
    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
    ball.spin = 0;
    ball.possessedBy = null;
    ball.trail = [];
    flickResolved = true;

    // Reset players to formation
    for (const p of players) {
      p.x = p.homeX;
      p.y = p.homeY;
      p.vx = 0; p.vy = 0;
      p.stunned = 0;
    }
    userPlayer.stamina = STAMINA_MAX;

    // Possession alternates: team that conceded kicks off. User gets
    // the ball at game start (lastScorer === null) and after they concede.
    if (lastScorer === 'home') {
      // Home scored — away takes kickoff
      const awayStriker = players.find(pp => pp.team === 'away' && pp.role === 'striker');
      ball.possessedBy = awayStriker;
      ball.x = awayStriker.x;
      ball.y = awayStriker.y + DRIBBLE_OFFSET;
    } else {
      ball.possessedBy = userPlayer;
      ball.x = userPlayer.x;
      ball.y = userPlayer.y - DRIBBLE_OFFSET;
    }
  }

  // ============================================================
  // PARTICLES / FLASH
  // ============================================================
  function flashText(text, color) { flashMsg = { text, color, t: 0 }; }
  function spawnConfetti(x, y) {
    const colors = ['#ffd84a','#ff6b6b','#4ecdc4','#ffffff','#a29bfe'];
    for (let i = 0; i < 36; i++) {
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*7,
        vy: (Math.random()-0.5)*7 - 1.5,
        color: colors[(Math.random()*colors.length)|0],
        life: 70, size: 2 + Math.random()*3
      });
    }
  }
  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.2; p.vx *= 0.98;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ============================================================
  // DRAWING
  // ============================================================
  function drawPitch() {
    // Stripes
    for (let i = 0; i < 10; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#4d9240' : '#488c3b';
      ctx.fillRect(0, i*(H/10), W, H/10);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    // Outer boundary
    ctx.strokeRect(PITCH_PAD, PITCH_PAD, W - 2*PITCH_PAD, H - 2*PITCH_PAD);
    // Halfway line
    ctx.beginPath(); ctx.moveTo(PITCH_PAD, H/2); ctx.lineTo(W - PITCH_PAD, H/2); ctx.stroke();
    // Center circle
    ctx.beginPath(); ctx.arc(W/2, H/2, 85, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2, H/2, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
    // Penalty boxes (top & bottom) — sized to narrower portrait field
    ctx.strokeRect(W/2 - 160, PITCH_PAD, 320, 130);
    ctx.strokeRect(W/2 - 160, H - PITCH_PAD - 130, 320, 130);
    ctx.strokeRect(W/2 - 90, PITCH_PAD, 180, 56);
    ctx.strokeRect(W/2 - 90, H - PITCH_PAD - 56, 180, 56);
    // Goals
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(goalTopX, goalTopY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.fillRect(goalBotX, goalBotY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
    ctx.strokeRect(goalTopX, goalTopY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.strokeRect(goalBotX, goalBotY, GOAL_WIDTH, GOAL_DEPTH);
    // Nets
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    for (let x = goalTopX; x <= goalTopX + GOAL_WIDTH; x += 10) {
      ctx.beginPath(); ctx.moveTo(x, goalTopY); ctx.lineTo(x, goalTopY + GOAL_DEPTH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, goalBotY); ctx.lineTo(x, goalBotY + GOAL_DEPTH); ctx.stroke();
    }
  }

  function drawPlayer(p) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + p.r - 1, p.r*0.9, p.r*0.38, 0, 0, Math.PI*2);
    ctx.fill();

    if (p.isSprinting) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      const back = p.facing + Math.PI;
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.arc(p.x + Math.cos(back)*i*4, p.y + Math.sin(back)*i*4, p.r*(1 - i*0.15), 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // Body
    const baseColor = p.team === 'home' ? (p.isUser ? '#ff4757' : '#e63946') : '#2e5fa8';
    ctx.fillStyle = p.role === 'keeper' ? '#f5c518' : baseColor;
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // Label for user player (highlight)
    if (p.isUser) {
      ctx.strokeStyle = '#ffd84a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI*2);
      ctx.stroke();
    }

    // Number / role
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = p.role === 'keeper' ? 'GK' : (p.isUser ? '10' : (p.role === 'striker' ? '9' : (p.team === 'home' ? '4' : '5')));
    ctx.fillText(label, p.x, p.y);

    // Facing indicator
    const fx = p.x + Math.cos(p.facing) * (p.r + 2);
    const fy = p.y + Math.sin(p.facing) * (p.r + 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    // Kicking leg
    const kickProgress = p.kickAnimDur > 0 ? p.kickAnimT / p.kickAnimDur : 1;
    if (kickProgress < 1) {
      const swing = Math.sin(kickProgress * Math.PI);
      const legLen = p.r + 6 + swing * 14;
      const lx = p.x + p.kickAnimDir.x * legLen;
      const ly = p.y + p.kickAnimDir.y * legLen;
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(lx, ly); ctx.stroke();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawBall() {
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    const shadowScale = 1 - Math.min(0.5, ball.z / 60);
    ctx.beginPath();
    ctx.ellipse(ball.x, ball.y + ball.r * 0.3, ball.r * shadowScale, ball.r * 0.38 * shadowScale, 0, 0, Math.PI*2);
    ctx.fill();

    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const alpha = (i / ball.trail.length) * 0.5;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      const trailY = (t.y || ball.y) - (t.z || 0);
      ctx.arc(t.x, trailY, ball.r * (0.3 + 0.7 * (i / ball.trail.length)), 0, Math.PI*2);
      ctx.fill();
    }

    const drawY = ball.y - ball.z;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ball.x, drawY, ball.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(ball.x + Math.cos(ball.rotation) * 3, drawY + Math.sin(ball.rotation) * 3, 1.6, 0, Math.PI*2);
    ctx.fill();
  }

  function drawTouchControls() {
    // Left joystick (only if active on touch)
    if (input.joyActive) {
      // Base ring
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(input.joyStartX, input.joyStartY, 60, 0, Math.PI*2);
      ctx.stroke();
      // Stick
      const dx = input.joyCurX - input.joyStartX;
      const dy = input.joyCurY - input.joyStartY;
      const mag = Math.hypot(dx, dy);
      const clamped = Math.min(mag, 60);
      const nx = mag > 0 ? dx/mag : 0;
      const ny = mag > 0 ? dy/mag : 0;
      // Sprint ring (appears when pushed hard)
      if (mag > 60 * 0.82) {
        ctx.strokeStyle = 'rgba(255, 216, 74, 0.7)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(input.joyStartX, input.joyStartY, 66, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.fillStyle = mag > 60 * 0.82 ? 'rgba(255, 216, 74, 0.9)' : 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(input.joyStartX + nx * clamped, input.joyStartY + ny * clamped, 22, 0, Math.PI*2);
      ctx.fill();
    }

    // Hint (only when nothing is happening & touch device)
    if (isTouchDevice && !input.joyActive && input.flickState === 'idle') {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DRAG', W * 0.25, H * 0.88);
      ctx.fillText('FLICK', W * 0.75, H * 0.88);
    }

    // Stamina bar — drawn as ring around user player
    if (userPlayer.stamina < STAMINA_MAX - 0.1) {
      const pct = userPlayer.stamina / STAMINA_MAX;
      ctx.strokeStyle = userPlayer.stamina < 20 ? 'rgba(255,107,107,0.9)' : userPlayer.stamina < 50 ? 'rgba(255,216,74,0.9)' : 'rgba(78,205,196,0.9)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(userPlayer.x, userPlayer.y, userPlayer.r + 6, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      ctx.stroke();
    }

    // Flick guide
    if (input.flickState === 'pullback' && input.flickPressStart) {
      const s = input.flickPressStart;
      const apexDist = Math.hypot(input.flickPullbackApex.x - s.x, input.flickPullbackApex.y - s.y);
      const ready = apexDist > 14;
      ctx.strokeStyle = ready ? '#ffd84a' : 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([5, 4]);
      const curX = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).x;
      const curY = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).y;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(curX, curY);
      ctx.stroke();
      ctx.setLineDash([]);
      // Press marker
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2); ctx.fill();
    } else if (input.flickState === 'forward' && input.flickPullbackApex) {
      ctx.strokeStyle = lobMode ? '#ffd84a' : '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(input.flickPullbackApex.x, input.flickPullbackApex.y);
      for (const pt of input.flickForwardPath) ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.fillStyle = '#ffd84a';
      ctx.beginPath(); ctx.arc(input.flickPullbackApex.x, input.flickPullbackApex.y, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawFlash() {
    if (!flashMsg) return;
    const alpha = Math.max(0, 1 - flashMsg.t / 55);
    ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(flashMsg.text, W/2, H/2);
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 70);
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // MATCH CLOCK
  // ============================================================
  function updateTimer() {
    if (!matchStartTime) matchStartTime = performance.now();
    const elapsed = (performance.now() - matchStartTime) / 1000;
    const remaining = Math.max(0, matchSeconds - elapsed);
    const m = Math.floor(remaining / 60);
    const s = Math.floor(remaining % 60);
    timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0 && gameState !== 'ended') {
      endMatch();
    }
  }

  function endMatch() {
    gameState = 'ended';
    // Snapshot and persist
    const record = {
      ts: Date.now(),
      scoreHome, scoreAway,
      home: { ...stats.home },
      away: { ...stats.away },
    };
    saveMatchRecord(record);
    showEndScreen(record);
  }

  function fmtStat(n) { return String(n); }

  function possessionPct(a, b) {
    const total = a + b;
    if (total === 0) return [50, 50];
    return [Math.round(a / total * 100), Math.round(b / total * 100)];
  }

  function showEndScreen(record) {
    const [hPct, aPct] = possessionPct(record.home.possessionFrames, record.away.possessionFrames);
    const result = record.scoreHome > record.scoreAway ? 'YOU WIN'
                  : record.scoreHome < record.scoreAway ? 'YOU LOSE' : 'DRAW';
    const resultClass = record.scoreHome > record.scoreAway ? 'win'
                      : record.scoreHome < record.scoreAway ? 'lose' : 'draw';
    const history = loadHistory();
    const histHtml = history.length === 0
      ? '<div class="history-empty">No past matches</div>'
      : history.slice(0, 5).map(r => {
          const d = new Date(r.ts);
          const when = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
                       d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          return `<div class="history-row"><span class="ts">${when}</span><span class="sc"><span style="color:#e63946">${r.scoreHome}</span>&nbsp;–&nbsp;<span style="color:#5a8be8">${r.scoreAway}</span></span></div>`;
        }).join('');

    endscreenEl.innerHTML = `
      <h2>FULL TIME</h2>
      <div class="result ${resultClass}">${result}</div>
      <div class="final-score">
        <span class="home">${record.scoreHome}</span>
        <span class="dash">–</span>
        <span class="away">${record.scoreAway}</span>
      </div>

      <div class="section-title">Match stats</div>
      <table>
        <thead><tr><th class="home-col">HOME</th><th></th><th class="away-col">AWAY</th></tr></thead>
        <tbody>
          <tr><td class="home-col">${fmtStat(record.home.goals)}</td><td class="label">Goals</td><td class="away-col">${fmtStat(record.away.goals)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.shots)}</td><td class="label">Shots</td><td class="away-col">${fmtStat(record.away.shots)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.shotsOnGoal)}</td><td class="label">Shots on goal</td><td class="away-col">${fmtStat(record.away.shotsOnGoal)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.passes)}</td><td class="label">Passes</td><td class="away-col">${fmtStat(record.away.passes)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.tackles)}</td><td class="label">Tackles</td><td class="away-col">${fmtStat(record.away.tackles)}</td></tr>
          <tr><td class="home-col">${hPct}%</td><td class="label">Possession</td><td class="away-col">${aPct}%</td></tr>
        </tbody>
      </table>

      <div class="section-title">Recent matches</div>
      <div class="history">${histHtml}</div>

      <button id="playAgainBtn">PLAY AGAIN</button>
    `;
    endscreenEl.classList.add('visible');
    const btn = document.getElementById('playAgainBtn');
    btn.addEventListener('click', resetForNewMatch);
    btn.addEventListener('touchstart', e => { e.preventDefault(); resetForNewMatch(); }, { passive: false });
  }

  function resetForNewMatch() {
    scoreHome = 0; scoreAway = 0;
    lastScorer = null;
    scoreHomeEl.textContent = 0;
    scoreAwayEl.textContent = 0;
    stats = { home: emptyTeamStats(), away: emptyTeamStats() };
    matchStartTime = performance.now();
    endscreenEl.classList.remove('visible');
    kickoff();
    startCountdown();
  }

  // ============================================================
  // MAIN LOOP — fixed 60Hz physics, variable-rate render
  // Prevents high-refresh displays (120Hz+) from running the game at 2x
  // speed, and prevents frame jitter from visibly accelerating the sim.
  // ============================================================
  const FIXED_DT_MS = 1000 / 60;
  const MAX_TICKS_PER_FRAME = 6;
  let accumulator = 0;
  let lastFrameTime = null;

  function step() {
    if (gameState === 'ended') return; // frozen after match ends

    if (gameState === 'countdown') {
      countdownFrames--;
      updateCountdownDisplay();
      if (countdownFrames <= 0) {
        gameState = 'playing';
        countdownEl.classList.remove('visible');
      }
      // still animate particles/flash during countdown
      updateParticles();
      if (flashMsg) {
        flashMsg.t++;
        if (flashMsg.t > 55) flashMsg = null;
      }
      return;
    }

    if (gameState === 'goalPause') {
      countdownFrames--;
      updateParticles();
      if (flashMsg) {
        flashMsg.t++;
        if (flashMsg.t > 55) flashMsg = null;
      }
      if (countdownFrames <= 0) {
        kickoff();
        startCountdown();
      }
      return;
    }

    // playing
    updateTimer();

    // Slow-motion — instead of freezing, run physics at 50% speed for a
    // handful of frames after a tackle. Implemented by skipping every
    // other step during hitstop — smoother than a hard freeze.
    if (hitstopFrames > 0) {
      hitstopFrames--;
      hitstopAltFrame = !hitstopAltFrame;
      if (hitstopAltFrame) {
        updateParticles();
        if (flashMsg) { flashMsg.t++; if (flashMsg.t > 55) flashMsg = null; }
        return;
      }
    }

    smoothedBall.x += (ball.x - smoothedBall.x) * BALL_SMOOTH;
    smoothedBall.y += (ball.y - smoothedBall.y) * BALL_SMOOTH;
    updateUserPlayer();
    for (const p of players) updateAI(p);
    handleTackles();
    dribbleBall();
    updateBall();
    updateParticles();
    if (flashMsg) {
      flashMsg.t++;
      if (flashMsg.t > 55) flashMsg = null;
    }

    // Track possession (one frame of credit to whichever team holds the ball)
    if (ball.possessedBy) stats[ball.possessedBy.team].possessionFrames++;
  }

  function startCountdown() {
    gameState = 'countdown';
    countdownFrames = COUNTDOWN_DURATION;
    countdownEl.classList.add('visible');
    updateCountdownDisplay();
  }

  function startGoalPause() {
    gameState = 'goalPause';
    countdownFrames = 90; // 1.5 seconds celebration, then countdown begins
    ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
  }

  function updateCountdownDisplay() {
    if (gameState !== 'countdown') return;
    // 3 → 2 → 1 → GO! over 180 frames
    const elapsed = COUNTDOWN_DURATION - countdownFrames;
    if (elapsed < 60) countdownEl.textContent = '3';
    else if (elapsed < 120) countdownEl.textContent = '2';
    else if (elapsed < 170) countdownEl.textContent = '1';
    else countdownEl.textContent = 'GO!';
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawPitch();
    for (const p of players) drawPlayer(p);
    drawBall();
    drawParticles();
    drawFlash();
    drawTouchControls();
  }

  function loop(now) {
    if (lastFrameTime === null) lastFrameTime = now;
    const delta = Math.min(250, now - lastFrameTime);
    lastFrameTime = now;
    accumulator += delta;

    let ticks = 0;
    while (accumulator >= FIXED_DT_MS && ticks < MAX_TICKS_PER_FRAME) {
      step();
      accumulator -= FIXED_DT_MS;
      ticks++;
    }
    if (ticks === MAX_TICKS_PER_FRAME) accumulator = 0; // drop backlog on long hitches

    render();
    requestAnimationFrame(loop);
  }

  // Kick it off
  setupPlayers();
  kickoff();
  startCountdown();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
