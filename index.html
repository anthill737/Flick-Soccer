<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Flick Foot Soccer 4v4</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #e5e5e5;
    touch-action: none;
    overscroll-behavior: none;
  }
  #app { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; background: #4a8f3c; position: absolute; top: 0; left: 0; }

  /* HUD */
  #hud {
    position: absolute;
    top: env(safe-area-inset-top, 8px);
    left: 0;
    right: 0;
    padding: 6px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  #score-box {
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    color: white;
    pointer-events: auto;
  }
  #score-box .home { color: #e63946; }
  #score-box .away { color: #2e5fa8; }
  #score-box .divider { opacity: 0.4; margin: 0 6px; }
  #timer {
    background: rgba(0,0,0,0.5);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    color: white;
    pointer-events: auto;
  }
  #lobToggle {
    background: rgba(0,0,0,0.6);
    padding: 12px 22px;
    border-radius: 26px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    border: 2px solid rgba(255,255,255,0.25);
    pointer-events: auto;
    min-width: 78px;
    min-height: 46px;
    /* Invisible extra tap area so fingers that land nearby still register */
    position: relative;
  }
  #lobToggle::before {
    content: '';
    position: absolute;
    inset: -14px;
  }
  #lobToggle.on { background: #ffd84a; color: #4a3800; border-color: #ffd84a; box-shadow: 0 0 14px rgba(255,216,74,0.6); }
  #version-tag {
    position: fixed;
    bottom: 6px;
    right: 8px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    z-index: 2000;
    pointer-events: none;
    font-family: monospace;
  }

  /* Desktop notice */
  #desktop-notice {
    position: fixed;
    inset: 0;
    background: #1a1a1a;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    padding: 40px;
    text-align: center;
  }
  #desktop-notice.visible { display: flex; }
  #desktop-notice h2 { font-size: 22px; font-weight: 500; margin-bottom: 12px; }
  #desktop-notice p { font-size: 14px; color: #999; line-height: 1.6; max-width: 420px; margin-bottom: 20px; }
  #desktop-notice button {
    background: #4ecdc4;
    color: #1a1a1a;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="desktop-notice">
  <h2>Mobile version</h2>
  <p>This is a portrait mobile game. On desktop: the left half of the field is the joystick, the right half is your flick zone.</p>
  <button onclick="document.getElementById('desktop-notice').classList.remove('visible')">Play anyway</button>
</div>

<div id="app">
  <canvas id="pitch"></canvas>
  <div id="hud">
    <div id="score-box">
      <span class="home">HOME <span id="scoreHome">0</span></span>
      <span class="divider">—</span>
      <span class="away"><span id="scoreAway">0</span> AWAY</span>
    </div>
    <div id="timer">02:00</div>
    <button id="lobToggle">LOB</button>
  </div>
  <div id="version-tag">V13</div>
</div>

<script>
(function() {
  // ============================================================
  // ORIENTATION / DEVICE DETECTION
  // ============================================================
  const desktopNotice = document.getElementById('desktop-notice');
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  // Show desktop notice briefly on non-touch
  if (!isTouchDevice) {
    desktopNotice.classList.add('visible');
  }

  // ============================================================
  // CANVAS SETUP (responsive to screen)
  // ============================================================
  const canvas = document.getElementById('pitch');
  const ctx = canvas.getContext('2d');

  // Portrait field — 9:16 aspect matches mobile soccer games (Mini Football,
  // Score! Hero, PES Mobile). Canvas fits the viewport preserving aspect —
  // black bars only appear on very tall or landscape screens.
  let W = 720, H = 1280;
  let canvasScaleX = 1, canvasScaleY = 1;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const aspect = W / H;

    let displayW, displayH;
    if (vw / vh > aspect) {
      displayH = vh;
      displayW = vh * aspect;
    } else {
      displayW = vw;
      displayH = vw / aspect;
    }

    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';
    canvas.style.left = ((vw - displayW) / 2) + 'px';
    canvas.style.top = ((vh - displayH) / 2) + 'px';

    canvas.width = displayW * dpr;
    canvas.height = displayH * dpr;

    canvasScaleX = displayW / W;
    canvasScaleY = displayH / H;
    ctx.setTransform(canvasScaleX * dpr, 0, 0, canvasScaleY * dpr, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
  resizeCanvas();

  // ============================================================
  // HUD
  // ============================================================
  const scoreHomeEl = document.getElementById('scoreHome');
  const scoreAwayEl = document.getElementById('scoreAway');
  const timerEl = document.getElementById('timer');
  const lobToggle = document.getElementById('lobToggle');

  // ============================================================
  // PHYSICS / TUNING CONSTANTS
  // ============================================================
  const GOAL_WIDTH = 180, GOAL_DEPTH = 22;
  const PITCH_PAD = 16;
  const goalTopX = W/2 - GOAL_WIDTH/2;
  const goalTopY = 6;
  const goalBotX = W/2 - GOAL_WIDTH/2;
  const goalBotY = H - 6 - GOAL_DEPTH;

  const PLAYER_WALK_MAX = 2.2;
  const PLAYER_SPRINT_MAX = 3.52;
  const PLAYER_ACCEL = 0.19;
  const PLAYER_DECEL = 0.18;

  const STAMINA_MAX = 100;
  const STAMINA_DRAIN = 0.32;
  const STAMINA_REGEN = 0.35;
  const STAMINA_MIN_TO_SPRINT = 8;

  // Ball — grounded: lower peak speed, moderate drag, spin decays fast
  // Ball — has weight but rolls out. Tuned so you can't smoke it the whole
  // length of the pitch; good shots reach the top third from midfield.
  const MAX_BALL_PX_PER_FRAME = 10.5;
  const MIN_SHOT_SPEED = 1.7;
  const POWER_SCALE = 0.0045;
  const POWER_BASELINE = 1.85;
  const LINEAR_DRAG = 0.0085;
  const QUAD_DRAG = 0.0025;

  const MAX_SPIN = 0.26;
  const MAGNUS_COEFF = 0.022;
  const SPIN_DECAY = 0.982;

  const GRAVITY = 0.43;
  const LOB_LAUNCH_MULT = 0.76; // horizontal velocity mult for lobs — +8% distance vs 0.7

  const DRIBBLE_OFFSET = 20;
  const DRIBBLE_SPRING = 0.28;
  const DRIBBLE_DAMPING = 0.72;
  const POSSESSION_RADIUS = 52;

  // ============================================================
  // GAME STATE — 4v4 (3 outfield + keeper each)
  // ============================================================
  // Home = RED (bottom), attacks top goal
  // Away = BLUE (top), attacks bottom goal
  // Player controls Home #10 (striker)

  let players = []; // all player objects
  let userPlayer = null;

  function createPlayer(team, role, x, y) {
    return {
      team, role, // role: 'keeper' | 'defender' | 'mid' | 'striker'
      x, y,
      vx: 0, vy: 0,
      r: 13,
      facing: team === 'home' ? -Math.PI/2 : Math.PI/2,
      kickAnimT: 0, kickAnimDur: 0, kickAnimDir: {x:0,y:-1},
      stamina: STAMINA_MAX,
      isSprinting: false,
      isUser: false,
      stunned: 0,
      homeX: x, homeY: y, // rest position for AI
      targetX: x, targetY: y,
    };
  }

  function setupPlayers() {
    players = [];
    // HOME (red, attacks up)
    players.push(createPlayer('home', 'keeper', W/2, H - 40));
    players.push(createPlayer('home', 'defender', W/2 - 110, H * 0.72));
    players.push(createPlayer('home', 'defender', W/2 + 110, H * 0.72));
    const user = createPlayer('home', 'striker', W/2, H * 0.58);
    user.isUser = true;
    players.push(user);
    userPlayer = user;

    // AWAY (blue, attacks down)
    players.push(createPlayer('away', 'keeper', W/2, 40));
    players.push(createPlayer('away', 'defender', W/2 - 110, H * 0.28));
    players.push(createPlayer('away', 'defender', W/2 + 110, H * 0.28));
    players.push(createPlayer('away', 'striker', W/2, H * 0.42));
  }

  const ball = {
    x: W/2, y: H/2,
    vx: 0, vy: 0,
    z: 0, vz: 0,
    spin: 0, rotation: 0,
    r: 8,
    possessedBy: null, // player object reference
    trail: [],
  };

  let scoreHome = 0, scoreAway = 0;
  let lastScorer = null; // 'home' | 'away' | null — who scored most recently; other team kicks off
  let matchSeconds = 120;
  let matchStartTime = null;
  let lobMode = false;
  let flickResolved = true;
  let flashMsg = null;
  const particles = [];

  function setLobMode(on) {
    lobMode = on;
    lobToggle.classList.toggle('on', lobMode);
  }
  lobToggle.addEventListener('click', () => setLobMode(!lobMode));
  lobToggle.addEventListener('touchstart', e => { e.preventDefault(); setLobMode(!lobMode); }, { passive: false });

  // ============================================================
  // INPUT — TOUCH (left joystick, right flick zone)
  // ============================================================
  // Left half of screen = movement joystick (appears where you first touch)
  // Left side also has SPRINT zone (upper-left corner area) — double-tap to sprint
  // Right half = flick zone (pull back, sweep forward)

  const input = {
    // Joystick
    joyActive: false,
    joyStartX: 0, joyStartY: 0,
    joyCurX: 0, joyCurY: 0,
    joyTouchId: null,
    sprintHeld: false, // if joystick pushed hard OR secondary tap

    // Flick
    flickTouchId: null,
    flickState: 'idle', // 'pullback' | 'forward' | 'idle'
    flickPressStart: null,
    flickPullbackApex: null,
    flickPullbackPath: [],
    flickForwardPath: [],
    flickPullbackDir: null,

    // Keyboard fallback (desktop)
    keys: {},
    mouseDown: false,
    mouseX: 0, mouseY: 0,
  };

  // Convert screen coords to game coords
  function screenToGame(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / canvasScaleX,
      y: (clientY - rect.top) / canvasScaleY,
    };
  }

  function isLeftSide(gameX) {
    // Portrait: left half of screen = joystick (left thumb), right half = flick (right thumb)
    return gameX < W * 0.5;
  }

  function handleTouchStart(e) {
    for (const t of e.changedTouches) {
      const g = screenToGame(t.clientX, t.clientY);

      if (isLeftSide(g.x) && !input.joyActive) {
        // Start joystick
        input.joyActive = true;
        input.joyTouchId = t.identifier;
        input.joyStartX = g.x;
        input.joyStartY = g.y;
        input.joyCurX = g.x;
        input.joyCurY = g.y;
      } else if (!isLeftSide(g.x) && input.flickTouchId === null) {
        // Start flick
        input.flickTouchId = t.identifier;
        input.flickState = 'pullback';
        input.flickPressStart = { x: g.x, y: g.y, t: performance.now() };
        input.flickPullbackApex = { x: g.x, y: g.y };
        input.flickPullbackPath = [{ x: g.x, y: g.y, t: performance.now() }];
        input.flickForwardPath = [];
        input.flickPullbackDir = null;
      }
    }
    e.preventDefault();
  }

  function handleTouchMove(e) {
    for (const t of e.changedTouches) {
      const g = screenToGame(t.clientX, t.clientY);
      if (t.identifier === input.joyTouchId) {
        input.joyCurX = g.x;
        input.joyCurY = g.y;
      } else if (t.identifier === input.flickTouchId) {
        updateFlickPath(g.x, g.y);
      }
    }
    e.preventDefault();
  }

  function handleTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === input.joyTouchId) {
        input.joyActive = false;
        input.joyTouchId = null;
      } else if (t.identifier === input.flickTouchId) {
        resolveFlick();
        input.flickTouchId = null;
      }
    }
    e.preventDefault();
  }

  canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
  canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
  canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
  canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

  // Desktop keyboard/mouse fallback
  window.addEventListener('keydown', e => {
    input.keys[e.key.toLowerCase()] = true;
    if (e.key === 'Shift') input.keys['shift'] = true;
    if (e.key === ' ') { e.preventDefault(); setLobMode(!lobMode); }
    if (['arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    input.keys[e.key.toLowerCase()] = false;
    if (e.key === 'Shift') input.keys['shift'] = false;
  });
  canvas.addEventListener('contextmenu', e => { e.preventDefault(); setLobMode(!lobMode); });

  canvas.addEventListener('mousedown', e => {
    if (e.button === 2) return;
    const g = screenToGame(e.clientX, e.clientY);
    if (!isLeftSide(g.x)) {
      input.mouseDown = true;
      input.flickState = 'pullback';
      input.flickPressStart = { x: g.x, y: g.y, t: performance.now() };
      input.flickPullbackApex = { x: g.x, y: g.y };
      input.flickPullbackPath = [{ x: g.x, y: g.y, t: performance.now() }];
      input.flickForwardPath = [];
      input.flickPullbackDir = null;
    }
  });
  canvas.addEventListener('mousemove', e => {
    const g = screenToGame(e.clientX, e.clientY);
    input.mouseX = g.x; input.mouseY = g.y;
    if (input.mouseDown) updateFlickPath(g.x, g.y);
  });
  window.addEventListener('mouseup', e => {
    if (e.button === 2) return;
    if (input.mouseDown) {
      resolveFlick();
      input.mouseDown = false;
    }
  });

  function updateFlickPath(x, y) {
    const now = performance.now();
    if (input.flickState === 'pullback') {
      input.flickPullbackPath.push({ x, y, t: now });
      const dFromStart = Math.hypot(x - input.flickPressStart.x, y - input.flickPressStart.y);
      const apexDist = Math.hypot(input.flickPullbackApex.x - input.flickPressStart.x, input.flickPullbackApex.y - input.flickPressStart.y);
      if (dFromStart > apexDist) {
        input.flickPullbackApex = { x, y };
      }

      if (apexDist > 14) {
        const backX = input.flickPressStart.x - input.flickPullbackApex.x;
        const backY = input.flickPressStart.y - input.flickPullbackApex.y;
        const backMag = Math.hypot(backX, backY);
        const bdx = backX / backMag, bdy = backY / backMag;
        if (input.flickPullbackPath.length >= 2) {
          const a = input.flickPullbackPath[Math.max(0, input.flickPullbackPath.length - 3)];
          const b = input.flickPullbackPath[input.flickPullbackPath.length - 1];
          const mdx = b.x - a.x, mdy = b.y - a.y;
          const mmag = Math.hypot(mdx, mdy);
          if (mmag > 2.5) {
            const dot = (mdx * bdx + mdy * bdy) / mmag;
            if (dot > 0.2) {
              input.flickPullbackDir = {
                x: (input.flickPullbackApex.x - input.flickPressStart.x) / apexDist,
                y: (input.flickPullbackApex.y - input.flickPressStart.y) / apexDist,
              };
              input.flickState = 'forward';
              input.flickForwardPath = [{ x, y, t: now }];
            }
          }
        }
      }
    } else if (input.flickState === 'forward') {
      input.flickForwardPath.push({ x, y, t: now });
      while (input.flickForwardPath.length > 2 && now - input.flickForwardPath[0].t > 400) input.flickForwardPath.shift();
    }
  }

  function resolveFlick() {
    if (input.flickState === 'forward' && input.flickForwardPath.length >= 2) {
      executeKick();
    }
    input.flickState = 'idle';
    input.flickPressStart = null;
    input.flickPullbackPath = [];
    input.flickForwardPath = [];
    input.flickPullbackApex = null;
    input.flickPullbackDir = null;
  }

  // ============================================================
  // KICK EXECUTION
  // ============================================================
  function executeKick() {
    // Coyote-time: accept the kick if the user has possession OR had it within
    // the last ~220ms and the ball is still close, OR the ball is right at the
    // player's feet (within dribble range). Mobile reaction time is imperfect
    // and this prevents "I flicked the exact second I got tackled" dead inputs.
    const hasPossession = ball.possessedBy === userPlayer;
    const now = performance.now();
    const recentlyLost = userPlayer._lastPossessAt && (now - userPlayer._lastPossessAt) < 220;
    const ballNear = !ball.possessedBy &&
      Math.hypot(ball.x - userPlayer.x, ball.y - userPlayer.y) < POSSESSION_RADIUS;
    if (!hasPossession && !(recentlyLost && ballNear) && !ballNear) return;
    if (!input.flickPullbackDir) return;
    if (input.flickForwardPath.length < 2) return;

    // If we're triggering via coyote/ballNear, re-grab possession so the kick math uses the player position
    if (!hasPossession) {
      ball.possessedBy = userPlayer;
      ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0; ball.spin = 0;
    }

    const first = input.flickForwardPath[0];
    const last = input.flickForwardPath[input.flickForwardPath.length - 1];
    const dt = (last.t - first.t) / 1000;
    if (dt < 0.015) return;

    let wx = 0, wy = 0, wsum = 0;
    for (let i = 0; i < input.flickForwardPath.length; i++) {
      const w = i + 1;
      wx += input.flickForwardPath[i].x * w;
      wy += input.flickForwardPath[i].y * w;
      wsum += w;
    }
    const weightedEnd = { x: wx / wsum, y: wy / wsum };
    const dVecX = weightedEnd.x - input.flickPullbackApex.x;
    const dVecY = weightedEnd.y - input.flickPullbackApex.y;
    const dVecM = Math.hypot(dVecX, dVecY);
    if (dVecM < 3) return;
    const dirX = dVecX / dVecM;
    const dirY = dVecY / dVecM;

    const swingDist = Math.hypot(last.x - first.x, last.y - first.y);
    const swingSpeedPerSec = swingDist / dt;
    if (swingDist < 8 || swingSpeedPerSec < 60) return;

    const rawPower = POWER_BASELINE + swingSpeedPerSec * POWER_SCALE;
    const power = Math.min(MAX_BALL_PX_PER_FRAME, Math.max(MIN_SHOT_SPEED, rawPower));

    let totalTurn = 0;
    for (let i = 1; i < input.flickForwardPath.length - 1; i++) {
      const a = input.flickForwardPath[i-1], b = input.flickForwardPath[i], c = input.flickForwardPath[i+1];
      const v1x = b.x - a.x, v1y = b.y - a.y;
      const v2x = c.x - b.x, v2y = c.y - b.y;
      const m1 = Math.hypot(v1x, v1y), m2 = Math.hypot(v2x, v2y);
      if (m1 < 2 || m2 < 2) continue;
      const cross = v1x * v2y - v1y * v2x;
      const dot = v1x * v2x + v1y * v2y;
      totalTurn += Math.atan2(cross, dot);
    }
    let spin = totalTurn * 0.6;
    if (spin > MAX_SPIN) spin = MAX_SPIN;
    if (spin < -MAX_SPIN) spin = -MAX_SPIN;

    // Release ball
    ball.possessedBy = null;
    ball.x = userPlayer.x + dirX * (userPlayer.r + ball.r + 2);
    ball.y = userPlayer.y + dirY * (userPlayer.r + ball.r + 2);

    if (lobMode) {
      const hPower = power * LOB_LAUNCH_MULT;
      ball.vx = dirX * hPower;
      ball.vy = dirY * hPower;
      ball.vz = power;
      ball.z = 0;
      ball.spin = spin * 0.5;
    } else {
      ball.vx = dirX * power;
      ball.vy = dirY * power;
      ball.vz = 0;
      ball.z = 0;
      ball.spin = spin;
    }

    flickResolved = false;
    userPlayer.kickAnimT = 0;
    userPlayer.kickAnimDur = 14;
    userPlayer.kickAnimDir = { x: dirX, y: dirY };
    userPlayer.facing = Math.atan2(dirY, dirX);
  }

  // ============================================================
  // USER PLAYER MOVEMENT
  // ============================================================
  function updateUserPlayer() {
    if (userPlayer.kickAnimT < userPlayer.kickAnimDur) userPlayer.kickAnimT++;
    if (ball.possessedBy === userPlayer) userPlayer._lastPossessAt = performance.now();

    let inX = 0, inY = 0;
    let sprintInput = false;

    if (input.joyActive) {
      const dx = input.joyCurX - input.joyStartX;
      const dy = input.joyCurY - input.joyStartY;
      const mag = Math.hypot(dx, dy);
      const maxReach = 60;
      if (mag > 8) {
        const clampedMag = Math.min(mag, maxReach);
        inX = (dx / mag);
        inY = (dy / mag);
        // Sprint only when joystick pushed hard past ~82% of max reach
        if (mag > maxReach * 0.82) sprintInput = true;
      }
    } else {
      // Keyboard fallback
      if (input.keys['w'] || input.keys['arrowup']) inY -= 1;
      if (input.keys['s'] || input.keys['arrowdown']) inY += 1;
      if (input.keys['a'] || input.keys['arrowleft']) inX -= 1;
      if (input.keys['d'] || input.keys['arrowright']) inX += 1;
      if (input.keys['shift']) sprintInput = true;
    }

    const moving = (inX !== 0 || inY !== 0);

    const wantsSprint = sprintInput && moving && userPlayer.stamina > 0;
    if (wantsSprint && !userPlayer.isSprinting && userPlayer.stamina < STAMINA_MIN_TO_SPRINT) {
      userPlayer.isSprinting = false;
    } else if (wantsSprint) {
      userPlayer.isSprinting = true;
    } else {
      userPlayer.isSprinting = false;
    }

    const maxSpeed = userPlayer.isSprinting ? PLAYER_SPRINT_MAX : PLAYER_WALK_MAX;

    let tvx = 0, tvy = 0;
    if (moving) {
      const m = Math.hypot(inX, inY);
      tvx = (inX / m) * maxSpeed;
      tvy = (inY / m) * maxSpeed;
    }

    const accelRate = moving ? PLAYER_ACCEL : PLAYER_DECEL;
    userPlayer.vx += (tvx - userPlayer.vx) * accelRate;
    userPlayer.vy += (tvy - userPlayer.vy) * accelRate;

    userPlayer.x += userPlayer.vx;
    userPlayer.y += userPlayer.vy;

    const vmag = Math.hypot(userPlayer.vx, userPlayer.vy);
    if (vmag > 0.3) {
      const targetFacing = Math.atan2(userPlayer.vy, userPlayer.vx);
      let delta = targetFacing - userPlayer.facing;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;
      userPlayer.facing += delta * 0.25;
    }

    if (userPlayer.isSprinting) {
      userPlayer.stamina = Math.max(0, userPlayer.stamina - STAMINA_DRAIN);
    } else {
      userPlayer.stamina = Math.min(STAMINA_MAX, userPlayer.stamina + STAMINA_REGEN);
    }

    clampPlayerToField(userPlayer);
  }

  function clampPlayerToField(p) {
    if (p.x < PITCH_PAD + p.r) { p.x = PITCH_PAD + p.r; p.vx = Math.max(0, p.vx); }
    if (p.x > W - PITCH_PAD - p.r) { p.x = W - PITCH_PAD - p.r; p.vx = Math.min(0, p.vx); }
    if (p.y < PITCH_PAD + p.r) { p.y = PITCH_PAD + p.r; p.vy = Math.max(0, p.vy); }
    if (p.y > H - PITCH_PAD - p.r) { p.y = H - PITCH_PAD - p.r; p.vy = Math.min(0, p.vy); }
  }

  // ============================================================
  // AI (teammates + opponents)
  // ============================================================
  function updateAI(p) {
    if (p.isUser) return;
    if (p.stunned > 0) { p.stunned--; return; }

    let tx, ty;
    const isHomeTeam = p.team === 'home';
    const ownGoalY = isHomeTeam ? H - 6 : 6;
    const ownGoalX = W / 2;
    const attackGoalY = isHomeTeam ? 6 : H - 6;

    if (p.role === 'keeper') {
      // Track ball along goal line, biased toward cutting angle
      const goalCenterY = isHomeTeam ? H - 30 : 30;
      const goalLimitL = W/2 - GOAL_WIDTH/2 + p.r + 4;
      const goalLimitR = W/2 + GOAL_WIDTH/2 - p.r - 4;
      tx = Math.max(goalLimitL, Math.min(goalLimitR, ball.x));
      ty = goalCenterY;
      // Rush out if ball is close & in danger zone
      const bdist = Math.hypot(ball.x - p.x, ball.y - p.y);
      if (bdist < 140 && Math.abs(ball.y - ownGoalY) < 200) {
        tx = ball.x;
        ty = ball.y + (isHomeTeam ? -15 : 15);
      }
    } else {
      const ballCarrier = ball.possessedBy;
      const ourPossession = ballCarrier && ballCarrier.team === p.team;
      const forward = isHomeTeam ? -1 : 1;
      const laneSide = p.homeX < W/2 ? -1 : 1;
      const distToBall = Math.hypot(p.x - ball.x, p.y - ball.y);

      // Count teammates closer to the ball than me — used to decide whether
      // I should go chase the ball (engage) or hold shape.
      let teammatesCloserToBall = 0;
      for (const mate of players) {
        if (mate === p || mate.team !== p.team || mate.role === 'keeper') continue;
        const md = Math.hypot(mate.x - ball.x, mate.y - ball.y);
        if (md < distToBall) teammatesCloserToBall++;
      }

      // BALL-FIRST override — active participation. Only ONE teammate leaves
      // formation at a time (previously up to 2 + anyone within 130, which
      // caused all three outfielders to stack on the ball).
      let engageBall = false;
      if (!ballCarrier) {
        // Loose ball: only the single closest teammate chases
        if (teammatesCloserToBall === 0) engageBall = true;
      } else if (ballCarrier.team !== p.team) {
        // Opponent has ball: only the closest pressures, within 220 units
        if (teammatesCloserToBall === 0 && distToBall < 220) engageBall = true;
      }

      if (engageBall) {
        // Lead the ball slightly — run to where it will be, not where it is
        tx = ball.x + ball.vx * 6;
        ty = ball.y + ball.vy * 6;
      } else if (ourPossession) {
        // OFFENSE: push up pitch in our lane
        if (p.role === 'defender') {
          tx = p.homeX;
          ty = ball.y - forward * 110;
          ty = isHomeTeam ? Math.max(H * 0.52, ty) : Math.min(H * 0.48, ty);
        } else {
          // Striker: reachable support run — 180 ahead of ball (was 260 = too far)
          tx = W/2 + laneSide * 130 + Math.sin(performance.now() / 1400 + p.homeX) * 30;
          ty = ball.y + forward * 180;
          const offsideY = isHomeTeam ? 95 : H - 95;
          ty = isHomeTeam ? Math.max(offsideY, ty) : Math.min(offsideY, ty);
        }
      } else {
        // DEFENSE — shape role (not the engagement candidate)
        if (p.role === 'defender') {
          tx = p.homeX * 0.55 + ball.x * 0.45;
          ty = (ball.y + ownGoalY) / 2;
          ty = ty * 0.6 + p.homeY * 0.4;
        } else {
          // Striker: forward outlet, nearer midfield so the pass is reachable
          tx = W/2 + laneSide * 110;
          ty = ball.y + forward * 110;
          ty = isHomeTeam ? Math.min(H * 0.48, ty) : Math.max(H * 0.52, ty);
        }
      }

      // Remember whether we're engaging so we can sprint
      p._engaging = engageBall;
    }

    // Separation — avoid clumping with same-team players. Larger radius +
    // stronger force so teammates don't stack on each other.
    let sepX = 0, sepY = 0;
    for (const other of players) {
      if (other === p) continue;
      if (other.team !== p.team) continue;
      const dx = p.x - other.x, dy = p.y - other.y;
      const d = Math.hypot(dx, dy);
      if (d < 68 && d > 0.01) {
        sepX += (dx / d) * (68 - d) * 0.1;
        sepY += (dy / d) * (68 - d) * 0.1;
      }
    }

    const dx = (tx - p.x) + sepX;
    const dy = (ty - p.y) + sepY;
    const d = Math.hypot(dx, dy);

    // Speed: walk for holding position, sprint-ish when actively engaging the ball
    let speedLimit = PLAYER_WALK_MAX * 0.90;
    if (p.role === 'keeper') speedLimit = PLAYER_WALK_MAX * 1.14;
    if (p._engaging) speedLimit = PLAYER_SPRINT_MAX * 0.88;

    let tvx = 0, tvy = 0;
    if (d > 4) {
      tvx = (dx / d) * speedLimit;
      tvy = (dy / d) * speedLimit;
    }

    p.vx += (tvx - p.vx) * 0.13;
    p.vy += (tvy - p.vy) * 0.13;
    p.x += p.vx;
    p.y += p.vy;

    const vmag = Math.hypot(p.vx, p.vy);
    if (vmag > 0.2) {
      const targetFacing = Math.atan2(p.vy, p.vx);
      let delta = targetFacing - p.facing;
      while (delta > Math.PI) delta -= 2 * Math.PI;
      while (delta < -Math.PI) delta += 2 * Math.PI;
      p.facing += delta * 0.25;
    }

    clampPlayerToField(p);

    // AI kicks ball if they possess it
    if (ball.possessedBy === p) {
      aiKick(p);
    } else if (p._possessionTime) {
      p._possessionTime = 0;
    }
  }

  function aiKick(p) {
    if (!p._kickCooldown) p._kickCooldown = 0;
    p._possessionTime = (p._possessionTime || 0) + 1;
    if (p._kickCooldown > 0) { p._kickCooldown--; return; }

    const isHomeTeam = p.team === 'home';
    const goalX = W/2;
    const goalY = isHomeTeam ? goalTopY : goalBotY + GOAL_DEPTH;
    const distToGoal = Math.hypot(goalX - p.x, goalY - p.y);

    // FORCED CLEAR: if AI has held ball > 90 frames (~1.5s), boot it forward
    // prevents the ball getting stuck when no good pass/shot exists
    if (p._possessionTime > 90) {
      const dx = goalX - p.x;
      const dy = (isHomeTeam ? goalTopY : goalBotY + GOAL_DEPTH) - p.y;
      const d = Math.hypot(dx, dy) || 1;
      const power = 6 + Math.random() * 1.5;
      ball.possessedBy = null;
      ball.x = p.x + (dx/d) * (p.r + ball.r + 2);
      ball.y = p.y + (dy/d) * (p.r + ball.r + 2);
      ball.vx = (dx/d) * power + (Math.random() - 0.5) * 1.5;
      ball.vy = (dy/d) * power;
      ball.vz = 0; ball.z = 0;
      ball.spin = 0;
      p._kickCooldown = 40;
      p._possessionTime = 0;
      flickResolved = false;
      p.kickAnimT = 0; p.kickAnimDur = 12;
      p.kickAnimDir = { x: dx/d, y: dy/d };
      return;
    }

    // Enemy (away) shoots more aggressively from farther; home AI slightly more eager too
    const shootRange = isHomeTeam ? 320 : 420;
    const shootProb = isHomeTeam ? 0.045 : 0.065;
    if (distToGoal < shootRange && Math.random() < shootProb) {
      const tx = goalX + (Math.random() - 0.5) * (GOAL_WIDTH - 20);
      const ty = goalY;
      const dx = tx - p.x, dy = ty - p.y;
      const d = Math.hypot(dx, dy);
      const power = 7.5 + Math.random() * 1.9;
      ball.possessedBy = null;
      ball.x = p.x + (dx/d) * (p.r + ball.r + 2);
      ball.y = p.y + (dy/d) * (p.r + ball.r + 2);
      ball.vx = (dx/d) * power;
      ball.vy = (dy/d) * power;
      ball.vz = 0; ball.z = 0;
      ball.spin = (Math.random() - 0.5) * 0.3;
      p._kickCooldown = 90;
      p._possessionTime = 0;
      flickResolved = false;
      p.kickAnimT = 0; p.kickAnimDur = 14;
      p.kickAnimDir = { x: dx/d, y: dy/d };
      return;
    }

    // Pass decision — score candidates by forward progress + openness
    if (Math.random() < 0.055) {
      let bestMate = null, bestScore = -Infinity;
      for (const mate of players) {
        if (mate === p || mate.team !== p.team || mate.role === 'keeper') continue;
        const ahead = isHomeTeam ? (p.y - mate.y) : (mate.y - p.y);
        // Allow back-passes but at reduced priority (no hard cutoff)

        // Openness: distance to nearest opponent
        let mateMarkDist = Infinity;
        for (const opp of players) {
          if (opp.team === p.team) continue;
          const od = Math.hypot(opp.x - mate.x, opp.y - mate.y);
          if (od < mateMarkDist) mateMarkDist = od;
        }
        const openness = Math.min(140, mateMarkDist); // cap contribution

        const distPenalty = Math.hypot(mate.x - p.x, mate.y - p.y) * 0.15;
        let score = (ahead >= 0 ? ahead * 0.5 : ahead * 0.2) + openness * 1.1 - distPenalty;
        // Prefer passing to the human player when they're on our team
        if (mate.isUser && isHomeTeam) score += 50;
        // Prefer striker for final ball
        if (mate.role === 'striker') score += 15;

        if (score > bestScore) { bestScore = score; bestMate = mate; }
      }
      if (bestMate) {
        const dx = bestMate.x - p.x, dy = bestMate.y - p.y;
        const d = Math.hypot(dx, dy);
        // Lead the pass slightly toward the receiver's velocity
        const leadX = bestMate.vx * 8;
        const leadY = bestMate.vy * 8;
        const ldx = dx + leadX, ldy = dy + leadY;
        const ld = Math.hypot(ldx, ldy);
        const power = Math.min(7.5, 3.2 + d * 0.017);
        ball.possessedBy = null;
        ball.x = p.x + (ldx/ld) * (p.r + ball.r + 2);
        ball.y = p.y + (ldy/ld) * (p.r + ball.r + 2);
        ball.vx = (ldx/ld) * power;
        ball.vy = (ldy/ld) * power;
        ball.vz = 0; ball.z = 0;
        ball.spin = 0;
        p._kickCooldown = 60;
        p._possessionTime = 0;
        flickResolved = false;
        p.kickAnimT = 0; p.kickAnimDur = 12;
        p.kickAnimDir = { x: ldx/ld, y: ldy/ld };
      }
    }
  }

  // ============================================================
  // BALL
  // ============================================================
  function dribbleBall() {
    const carrier = ball.possessedBy;
    if (!carrier) return;

    const vmag = Math.hypot(carrier.vx, carrier.vy);
    const offset = DRIBBLE_OFFSET + vmag * 3;
    const tx = carrier.x + Math.cos(carrier.facing) * offset;
    const ty = carrier.y + Math.sin(carrier.facing) * offset;

    const dx = tx - ball.x;
    const dy = ty - ball.y;
    ball.vx += dx * DRIBBLE_SPRING;
    ball.vy += dy * DRIBBLE_SPRING;
    ball.vx *= DRIBBLE_DAMPING;
    ball.vy *= DRIBBLE_DAMPING;

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.spin = 0;
    ball.trail = [];
    ball.rotation += vmag * 0.2;

    const pd = Math.hypot(ball.x - carrier.x, ball.y - carrier.y);
    if (pd > POSSESSION_RADIUS + 20) {
      ball.possessedBy = null;
      flickResolved = true;
    }
  }

  function updateBall() {
    if (ball.possessedBy) return;

    ball.trail.push({ x: ball.x, y: ball.y, z: ball.z });
    if (ball.trail.length > 35) ball.trail.shift();

    if (ball.z > 0 || ball.vz > 0) {
      ball.z += ball.vz;
      ball.vz -= GRAVITY;
      if (ball.z <= 0) {
        ball.z = 0;
        ball.vz = -ball.vz * 0.35;
        ball.vx *= 0.75;
        ball.vy *= 0.75;
        if (Math.abs(ball.vz) < 0.4) ball.vz = 0;
      }
    }

    const speed = Math.hypot(ball.vx, ball.vy);
    if (speed > 0.05 && ball.z < 15) {
      const perpX = -ball.vy / speed;
      const perpY = ball.vx / speed;
      const magnusForce = ball.spin * speed * MAGNUS_COEFF;
      ball.vx += perpX * magnusForce;
      ball.vy += perpY * magnusForce;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    const newSpeed = Math.hypot(ball.vx, ball.vy);
    if (newSpeed > 0) {
      const drag = ball.z > 3 ? QUAD_DRAG * newSpeed * 0.5 : LINEAR_DRAG + QUAD_DRAG * newSpeed;
      const newSpeedAfter = Math.max(0, newSpeed - drag);
      const scale = newSpeedAfter / newSpeed;
      ball.vx *= scale;
      ball.vy *= scale;
    }
    ball.spin *= SPIN_DECAY;
    ball.rotation += ball.spin * 0.4 + newSpeed * 0.08;

    // Walls (sides)
    if (ball.x < ball.r + PITCH_PAD) { ball.x = ball.r + PITCH_PAD; ball.vx *= -0.55; ball.spin *= -0.4; }
    if (ball.x > W - ball.r - PITCH_PAD) { ball.x = W - ball.r - PITCH_PAD; ball.vx *= -0.55; ball.spin *= -0.4; }

    // Goal detection (both goals)
    if (!flickResolved) {
      // Top goal (away)
      if (ball.y - ball.r < goalTopY + GOAL_DEPTH && ball.x > goalTopX + 3 && ball.x < goalTopX + GOAL_WIDTH - 3 && ball.z < 50) {
        if (ball.y < goalTopY + GOAL_DEPTH - 2) {
          scoreHome++;
          lastScorer = 'home';
          scoreHomeEl.textContent = scoreHome;
          flickResolved = true;
          flashText('GOAL!', '#ffd84a');
          spawnConfetti(ball.x, ball.y);
          setTimeout(kickoff, 1400);
          ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
          return;
        }
      }
      // Bottom goal (home)
      if (ball.y + ball.r > goalBotY && ball.x > goalBotX + 3 && ball.x < goalBotX + GOAL_WIDTH - 3 && ball.z < 50) {
        if (ball.y > goalBotY + 2) {
          scoreAway++;
          lastScorer = 'away';
          scoreAwayEl.textContent = scoreAway;
          flickResolved = true;
          flashText('CONCEDED', '#ff6b6b');
          setTimeout(kickoff, 1400);
          ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
          return;
        }
      }
    }

    // Top/bottom walls (outside goal mouth) - sidelines
    if (ball.y < ball.r + PITCH_PAD) {
      const inGoalMouth = ball.x > goalTopX && ball.x < goalTopX + GOAL_WIDTH;
      if (!inGoalMouth) { ball.y = ball.r + PITCH_PAD; ball.vy *= -0.55; }
    }
    if (ball.y > H - ball.r - PITCH_PAD) {
      const inGoalMouth = ball.x > goalBotX && ball.x < goalBotX + GOAL_WIDTH;
      if (!inGoalMouth) { ball.y = H - ball.r - PITCH_PAD; ball.vy *= -0.55; }
    }

    // Ball-player collisions (pickup or deflect)
    for (const p of players) {
      const ddx = ball.x - p.x, ddy = ball.y - p.y;
      const ddist = Math.hypot(ddx, ddy);
      if (ddist < p.r + ball.r && ball.z < 18) {
        if (p.role === 'keeper' && !flickResolved) {
          // Keeper catches
          ball.vy = -ball.vy * 0.5;
          ball.vx *= 0.4;
          ball.spin *= 0.2;
          flickResolved = true;
          flashText(p.team === 'home' ? 'KEEPER SAVE' : 'SAVED!', '#ffffff');
          continue;
        }
        // Other players: pick up if ball slow, deflect if fast
        const ballSpeed = Math.hypot(ball.vx, ball.vy);
        if (ballSpeed < 7.4 && flickResolved) {
          ball.possessedBy = p;
          ball.vx = 0; ball.vy = 0; ball.spin = 0;
          if (p === userPlayer) flickResolved = true;
          break;
        } else if (!flickResolved) {
          const nx = ddx / ddist, ny = ddy / ddist;
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx -= 2 * dot * nx;
          ball.vy -= 2 * dot * ny;
          ball.vx *= 0.55; ball.vy *= 0.55;
          p.stunned = 30;
          if (p.team !== userPlayer.team && !flickResolved) flashText('BLOCKED', '#ff9f40');
        }
      }
    }

    // Settle — lower threshold so the ball rolls out longer before stopping
    if (Math.hypot(ball.vx, ball.vy) < 0.08 && ball.z < 0.5 && Math.abs(ball.vz) < 0.2) {
      ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
      flickResolved = true;
    }
  }

  function kickoff() {
    ball.x = W/2;
    ball.y = H/2;
    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.z = 0;
    ball.spin = 0;
    ball.possessedBy = null;
    ball.trail = [];
    flickResolved = true;

    // Reset players to formation
    for (const p of players) {
      p.x = p.homeX;
      p.y = p.homeY;
      p.vx = 0; p.vy = 0;
      p.stunned = 0;
    }
    userPlayer.stamina = STAMINA_MAX;

    // Possession alternates: team that conceded kicks off. User gets
    // the ball at game start (lastScorer === null) and after they concede.
    if (lastScorer === 'home') {
      // Home scored — away takes kickoff
      const awayStriker = players.find(pp => pp.team === 'away' && pp.role === 'striker');
      ball.possessedBy = awayStriker;
      ball.x = awayStriker.x;
      ball.y = awayStriker.y + DRIBBLE_OFFSET;
    } else {
      ball.possessedBy = userPlayer;
      ball.x = userPlayer.x;
      ball.y = userPlayer.y - DRIBBLE_OFFSET;
    }
  }

  // ============================================================
  // PARTICLES / FLASH
  // ============================================================
  function flashText(text, color) { flashMsg = { text, color, t: 0 }; }
  function spawnConfetti(x, y) {
    const colors = ['#ffd84a','#ff6b6b','#4ecdc4','#ffffff','#a29bfe'];
    for (let i = 0; i < 36; i++) {
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*7,
        vy: (Math.random()-0.5)*7 - 1.5,
        color: colors[(Math.random()*colors.length)|0],
        life: 70, size: 2 + Math.random()*3
      });
    }
  }
  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.2; p.vx *= 0.98;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ============================================================
  // DRAWING
  // ============================================================
  function drawPitch() {
    // Stripes
    for (let i = 0; i < 10; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#4d9240' : '#488c3b';
      ctx.fillRect(0, i*(H/10), W, H/10);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    // Outer boundary
    ctx.strokeRect(PITCH_PAD, PITCH_PAD, W - 2*PITCH_PAD, H - 2*PITCH_PAD);
    // Halfway line
    ctx.beginPath(); ctx.moveTo(PITCH_PAD, H/2); ctx.lineTo(W - PITCH_PAD, H/2); ctx.stroke();
    // Center circle
    ctx.beginPath(); ctx.arc(W/2, H/2, 85, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(W/2, H/2, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
    // Penalty boxes (top & bottom) — sized to narrower portrait field
    ctx.strokeRect(W/2 - 160, PITCH_PAD, 320, 130);
    ctx.strokeRect(W/2 - 160, H - PITCH_PAD - 130, 320, 130);
    ctx.strokeRect(W/2 - 90, PITCH_PAD, 180, 56);
    ctx.strokeRect(W/2 - 90, H - PITCH_PAD - 56, 180, 56);
    // Goals
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(goalTopX, goalTopY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.fillRect(goalBotX, goalBotY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
    ctx.strokeRect(goalTopX, goalTopY, GOAL_WIDTH, GOAL_DEPTH);
    ctx.strokeRect(goalBotX, goalBotY, GOAL_WIDTH, GOAL_DEPTH);
    // Nets
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    for (let x = goalTopX; x <= goalTopX + GOAL_WIDTH; x += 10) {
      ctx.beginPath(); ctx.moveTo(x, goalTopY); ctx.lineTo(x, goalTopY + GOAL_DEPTH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, goalBotY); ctx.lineTo(x, goalBotY + GOAL_DEPTH); ctx.stroke();
    }
  }

  function drawPlayer(p) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + p.r - 1, p.r*0.9, p.r*0.38, 0, 0, Math.PI*2);
    ctx.fill();

    if (p.isSprinting) {
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      const back = p.facing + Math.PI;
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.arc(p.x + Math.cos(back)*i*4, p.y + Math.sin(back)*i*4, p.r*(1 - i*0.15), 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // Body
    const baseColor = p.team === 'home' ? (p.isUser ? '#ff4757' : '#e63946') : '#2e5fa8';
    ctx.fillStyle = p.role === 'keeper' ? '#f5c518' : baseColor;
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();

    // Label for user player (highlight)
    if (p.isUser) {
      ctx.strokeStyle = '#ffd84a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI*2);
      ctx.stroke();
    }

    // Number / role
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = p.role === 'keeper' ? 'GK' : (p.isUser ? '10' : (p.role === 'striker' ? '9' : (p.team === 'home' ? '4' : '5')));
    ctx.fillText(label, p.x, p.y);

    // Facing indicator
    const fx = p.x + Math.cos(p.facing) * (p.r + 2);
    const fy = p.y + Math.sin(p.facing) * (p.r + 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(fx, fy);
    ctx.stroke();

    // Kicking leg
    const kickProgress = p.kickAnimDur > 0 ? p.kickAnimT / p.kickAnimDur : 1;
    if (kickProgress < 1) {
      const swing = Math.sin(kickProgress * Math.PI);
      const legLen = p.r + 6 + swing * 14;
      const lx = p.x + p.kickAnimDir.x * legLen;
      const ly = p.y + p.kickAnimDir.y * legLen;
      ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(lx, ly); ctx.stroke();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawBall() {
    // Shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    const shadowScale = 1 - Math.min(0.5, ball.z / 60);
    ctx.beginPath();
    ctx.ellipse(ball.x, ball.y + ball.r * 0.3, ball.r * shadowScale, ball.r * 0.38 * shadowScale, 0, 0, Math.PI*2);
    ctx.fill();

    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const alpha = (i / ball.trail.length) * 0.5;
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.beginPath();
      const trailY = (t.y || ball.y) - (t.z || 0);
      ctx.arc(t.x, trailY, ball.r * (0.3 + 0.7 * (i / ball.trail.length)), 0, Math.PI*2);
      ctx.fill();
    }

    const drawY = ball.y - ball.z;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ball.x, drawY, ball.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(ball.x + Math.cos(ball.rotation) * 3, drawY + Math.sin(ball.rotation) * 3, 1.6, 0, Math.PI*2);
    ctx.fill();
  }

  function drawTouchControls() {
    // Left joystick (only if active on touch)
    if (input.joyActive) {
      // Base ring
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(input.joyStartX, input.joyStartY, 60, 0, Math.PI*2);
      ctx.stroke();
      // Stick
      const dx = input.joyCurX - input.joyStartX;
      const dy = input.joyCurY - input.joyStartY;
      const mag = Math.hypot(dx, dy);
      const clamped = Math.min(mag, 60);
      const nx = mag > 0 ? dx/mag : 0;
      const ny = mag > 0 ? dy/mag : 0;
      // Sprint ring (appears when pushed hard)
      if (mag > 60 * 0.82) {
        ctx.strokeStyle = 'rgba(255, 216, 74, 0.7)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(input.joyStartX, input.joyStartY, 66, 0, Math.PI*2);
        ctx.stroke();
      }
      ctx.fillStyle = mag > 60 * 0.82 ? 'rgba(255, 216, 74, 0.9)' : 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(input.joyStartX + nx * clamped, input.joyStartY + ny * clamped, 22, 0, Math.PI*2);
      ctx.fill();
    }

    // Hint (only when nothing is happening & touch device)
    if (isTouchDevice && !input.joyActive && input.flickState === 'idle') {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DRAG', W * 0.25, H * 0.88);
      ctx.fillText('FLICK', W * 0.75, H * 0.88);
    }

    // Stamina bar — drawn as ring around user player
    if (userPlayer.stamina < STAMINA_MAX - 0.1) {
      const pct = userPlayer.stamina / STAMINA_MAX;
      ctx.strokeStyle = userPlayer.stamina < 20 ? 'rgba(255,107,107,0.9)' : userPlayer.stamina < 50 ? 'rgba(255,216,74,0.9)' : 'rgba(78,205,196,0.9)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(userPlayer.x, userPlayer.y, userPlayer.r + 6, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      ctx.stroke();
    }

    // Flick guide
    if (input.flickState === 'pullback' && input.flickPressStart) {
      const s = input.flickPressStart;
      const apexDist = Math.hypot(input.flickPullbackApex.x - s.x, input.flickPullbackApex.y - s.y);
      const ready = apexDist > 14;
      ctx.strokeStyle = ready ? '#ffd84a' : 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([5, 4]);
      const curX = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).x;
      const curY = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).y;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(curX, curY);
      ctx.stroke();
      ctx.setLineDash([]);
      // Press marker
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2); ctx.fill();
    } else if (input.flickState === 'forward' && input.flickPullbackApex) {
      ctx.strokeStyle = lobMode ? '#ffd84a' : '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(input.flickPullbackApex.x, input.flickPullbackApex.y);
      for (const pt of input.flickForwardPath) ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.fillStyle = '#ffd84a';
      ctx.beginPath(); ctx.arc(input.flickPullbackApex.x, input.flickPullbackApex.y, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawFlash() {
    if (!flashMsg) return;
    const alpha = Math.max(0, 1 - flashMsg.t / 55);
    ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(flashMsg.text, W/2, H/2);
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 70);
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // MATCH CLOCK
  // ============================================================
  function updateTimer() {
    if (!matchStartTime) matchStartTime = performance.now();
    const elapsed = (performance.now() - matchStartTime) / 1000;
    const remaining = Math.max(0, matchSeconds - elapsed);
    const m = Math.floor(remaining / 60);
    const s = Math.floor(remaining % 60);
    timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0 && !window._matchEnded) {
      window._matchEnded = true;
      setTimeout(() => {
        const result = scoreHome > scoreAway ? 'YOU WIN!' : scoreHome < scoreAway ? 'YOU LOSE' : 'DRAW';
        flashText(result, scoreHome >= scoreAway ? '#ffd84a' : '#ff6b6b');
        setTimeout(() => {
          scoreHome = 0; scoreAway = 0;
          lastScorer = null;
          scoreHomeEl.textContent = 0;
          scoreAwayEl.textContent = 0;
          matchStartTime = performance.now();
          window._matchEnded = false;
          kickoff();
        }, 3000);
      }, 100);
    }
  }

  // ============================================================
  // MAIN LOOP — fixed 60Hz physics, variable-rate render
  // Prevents high-refresh displays (120Hz+) from running the game at 2x
  // speed, and prevents frame jitter from visibly accelerating the sim.
  // ============================================================
  const FIXED_DT_MS = 1000 / 60;
  const MAX_TICKS_PER_FRAME = 6;
  let accumulator = 0;
  let lastFrameTime = null;

  function step() {
    updateTimer();
    updateUserPlayer();
    for (const p of players) updateAI(p);
    dribbleBall();
    updateBall();
    updateParticles();
    if (flashMsg) {
      flashMsg.t++;
      if (flashMsg.t > 55) flashMsg = null;
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawPitch();
    for (const p of players) drawPlayer(p);
    drawBall();
    drawParticles();
    drawFlash();
    drawTouchControls();
  }

  function loop(now) {
    if (lastFrameTime === null) lastFrameTime = now;
    const delta = Math.min(250, now - lastFrameTime);
    lastFrameTime = now;
    accumulator += delta;

    let ticks = 0;
    while (accumulator >= FIXED_DT_MS && ticks < MAX_TICKS_PER_FRAME) {
      step();
      accumulator -= FIXED_DT_MS;
      ticks++;
    }
    if (ticks === MAX_TICKS_PER_FRAME) accumulator = 0; // drop backlog on long hitches

    render();
    requestAnimationFrame(loop);
  }

  // Kick it off
  setupPlayers();
  kickoff();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
