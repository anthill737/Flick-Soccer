    drawPentagonShape(ball.x, drawY, ball.r * 0.42, ball.rotation);
    for (let i = 0; i < 5; i++) {
      const ang = ball.rotation + (i / 5) * Math.PI * 2 + Math.PI / 5;
      const px = ball.x + Math.cos(ang) * ball.r * 0.72;
      const py = drawY + Math.sin(ang) * ball.r * 0.72;
      drawPentagonShape(px, py, ball.r * 0.22, ball.rotation + ang);
    }
  }

  function drawPentagonShape(cx, cy, size, rotation) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = rotation - Math.PI/2 + (i / 5) * Math.PI * 2;
      const x = cx + Math.cos(a) * size;
      const y = cy + Math.sin(a) * size;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawTouchControls() {
    // Left joystick (only if active on touch)
    if (input.joyActive) {
      const maxReachVis = 85;
      const sprintThresholdR = maxReachVis * 0.97;
      const dx = input.joyCurX - input.joyStartX;
      const dy = input.joyCurY - input.joyStartY;
      const mag = Math.hypot(dx, dy);
      const clamped = Math.min(mag, maxReachVis);
      const nx = mag > 0 ? dx/mag : 0;
      const ny = mag > 0 ? dy/mag : 0;
      const isSprinting = mag > sprintThresholdR;

      // Base ring — dim
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(input.joyStartX, input.joyStartY, maxReachVis, 0, Math.PI*2);
      ctx.stroke();

      // Stamina ring — concentric, fills clockwise proportional to stamina.
      // Color shifts green -> yellow -> red as stamina drains.
      const staminaPct = userPlayer.stamina / STAMINA_MAX;
      const staminaColor = staminaPct > 0.5 ? '#4ecd6a'
                         : staminaPct > 0.2 ? '#ffd84a' : '#ff5252';
      ctx.strokeStyle = staminaColor;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(input.joyStartX, input.joyStartY, maxReachVis + 10,
              -Math.PI/2, -Math.PI/2 + staminaPct * Math.PI * 2);
      ctx.stroke();

      // Sprint threshold ring — always visible so the player can FEEL
      // the edge of walk vs sprint. Dashed; brightens when crossed.
      ctx.strokeStyle = isSprinting ? 'rgba(255, 216, 74, 0.95)' : 'rgba(255, 216, 74, 0.4)';
      ctx.lineWidth = isSprinting ? 3 : 2;
      ctx.setLineDash([5, 4]);
      ctx.beginPath();
      ctx.arc(input.joyStartX, input.joyStartY, sprintThresholdR, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Sprint glow — pulsing yellow halo when sprinting
      if (isSprinting) {
        const pulse = 0.65 + 0.35 * Math.sin(performance.now() / 90);
        ctx.strokeStyle = `rgba(255, 216, 74, ${pulse})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(input.joyStartX, input.joyStartY, maxReachVis + 20, 0, Math.PI*2);
        ctx.stroke();
      }

      // Stick head
      ctx.fillStyle = isSprinting ? 'rgba(255, 216, 74, 0.95)' : 'rgba(255,255,255,0.82)';
      ctx.beginPath();
      ctx.arc(input.joyStartX + nx * clamped, input.joyStartY + ny * clamped, 26, 0, Math.PI*2);
      ctx.fill();

      // "SPRINT" label pops up when sprinting
      if (isSprinting) {
        ctx.fillStyle = '#ffd84a';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('SPRINT', input.joyStartX, input.joyStartY - maxReachVis - 28);
      }
    }

    // Hint (only when nothing is happening & touch device)
    if (isTouchDevice && !input.joyActive && input.flickState === 'idle') {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DRAG', W * 0.25, H * 0.88);
      ctx.fillText('FLICK', W * 0.75, H * 0.88);
    }

    // Stamina bar — ring around user player; doubles as a strong
    // sprint indicator (bright glow) when actively sprinting.
    if (userPlayer.stamina < STAMINA_MAX - 0.1 || userPlayer.isSprinting) {
      const pct = userPlayer.stamina / STAMINA_MAX;
      const baseColor = userPlayer.stamina < 20 ? 'rgba(255,82,82,0.95)'
                      : userPlayer.stamina < 50 ? 'rgba(255,216,74,0.95)'
                      : 'rgba(78,205,106,0.95)';
      ctx.strokeStyle = baseColor;
      ctx.lineWidth = userPlayer.isSprinting ? 4 : 2.5;
      ctx.beginPath();
      ctx.arc(userPlayer.x, userPlayer.y, userPlayer.r + 7, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
      ctx.stroke();
      // Outer glow when sprinting — player looks "lit up"
      if (userPlayer.isSprinting) {
        ctx.strokeStyle = 'rgba(255, 216, 74, 0.35)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(userPlayer.x, userPlayer.y, userPlayer.r + 12, 0, Math.PI*2);
        ctx.stroke();
      }
    }

    // Flick guide
    if (input.flickState === 'pullback' && input.flickPressStart) {
      const s = input.flickPressStart;
      const apexDist = Math.hypot(input.flickPullbackApex.x - s.x, input.flickPullbackApex.y - s.y);
      const ready = apexDist > 14;
      ctx.strokeStyle = ready ? '#ffd84a' : 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([5, 4]);
      const curX = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).x;
      const curY = (input.flickPullbackPath[input.flickPullbackPath.length - 1] || s).y;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(curX, curY);
      ctx.stroke();
      ctx.setLineDash([]);
      // Press marker
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, Math.PI*2); ctx.fill();
    } else if (input.flickState === 'forward' && input.flickPullbackApex) {
      ctx.strokeStyle = lobMode ? '#ffd84a' : '#ff6b6b';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(input.flickPullbackApex.x, input.flickPullbackApex.y);
      for (const pt of input.flickForwardPath) ctx.lineTo(pt.x, pt.y);
      ctx.stroke();
      ctx.fillStyle = '#ffd84a';
      ctx.beginPath(); ctx.arc(input.flickPullbackApex.x, input.flickPullbackApex.y, 5, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawFlash() {
    if (!flashMsg) return;
    const alpha = Math.max(0, 1 - flashMsg.t / 55);
    ctx.fillStyle = flashMsg.color;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 48px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(flashMsg.text, W/2, H/2);
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 70);
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // MATCH CLOCK
  // ============================================================
  function updateTimer() {
    if (!matchStartTime) matchStartTime = performance.now();
    const elapsed = (performance.now() - matchStartTime) / 1000;
    const remaining = Math.max(0, matchSeconds - elapsed);
    const m = Math.floor(remaining / 60);
    const s = Math.floor(remaining % 60);
    timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if (remaining <= 0 && gameState !== 'ended') {
      endMatch();
    }
  }

  function endMatch() {
    gameState = 'ended';
    // Snapshot and persist
    const record = {
      ts: Date.now(),
      scoreHome, scoreAway,
      home: { ...stats.home },
      away: { ...stats.away },
    };
    saveMatchRecord(record);
    showEndScreen(record);
  }

  function fmtStat(n) { return String(n); }

  function possessionPct(a, b) {
    const total = a + b;
    if (total === 0) return [50, 50];
    return [Math.round(a / total * 100), Math.round(b / total * 100)];
  }

  function showEndScreen(record) {
    const [hPct, aPct] = possessionPct(record.home.possessionFrames, record.away.possessionFrames);
    const result = record.scoreHome > record.scoreAway ? 'YOU WIN'
                  : record.scoreHome < record.scoreAway ? 'YOU LOSE' : 'DRAW';
    const resultClass = record.scoreHome > record.scoreAway ? 'win'
                      : record.scoreHome < record.scoreAway ? 'lose' : 'draw';
    const history = loadHistory();
    const histHtml = history.length === 0
      ? '<div class="history-empty">No past matches</div>'
      : history.slice(0, 5).map(r => {
          const d = new Date(r.ts);
          const when = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' ' +
                       d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          return `<div class="history-row"><span class="ts">${when}</span><span class="sc"><span style="color:#e63946">${r.scoreHome}</span>&nbsp;–&nbsp;<span style="color:#5a8be8">${r.scoreAway}</span></span></div>`;
        }).join('');

    endscreenEl.innerHTML = `
      <h2>FULL TIME</h2>
      <div class="result ${resultClass}">${result}</div>
      <div class="final-score">
        <span class="home">${record.scoreHome}</span>
        <span class="dash">–</span>
        <span class="away">${record.scoreAway}</span>
      </div>

      <div class="section-title">Match stats</div>
      <table>
        <thead><tr><th class="home-col">HOME</th><th></th><th class="away-col">AWAY</th></tr></thead>
        <tbody>
          <tr><td class="home-col">${fmtStat(record.home.goals)}</td><td class="label">Goals</td><td class="away-col">${fmtStat(record.away.goals)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.shots)}</td><td class="label">Shots</td><td class="away-col">${fmtStat(record.away.shots)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.shotsOnGoal)}</td><td class="label">Shots on goal</td><td class="away-col">${fmtStat(record.away.shotsOnGoal)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.passes)}</td><td class="label">Passes</td><td class="away-col">${fmtStat(record.away.passes)}</td></tr>
          <tr><td class="home-col">${fmtStat(record.home.tackles)}</td><td class="label">Tackles</td><td class="away-col">${fmtStat(record.away.tackles)}</td></tr>
          <tr><td class="home-col">${hPct}%</td><td class="label">Possession</td><td class="away-col">${aPct}%</td></tr>
        </tbody>
      </table>

      <div class="section-title">Recent matches</div>
      <div class="history">${histHtml}</div>

      <button id="playAgainBtn">CONTINUE</button>
    `;
    endscreenEl.classList.add('visible');
    const btn = document.getElementById('playAgainBtn');
    const handler = (e) => { if (e) e.preventDefault(); returnToIntro(); };
    btn.addEventListener('click', handler);
    btn.addEventListener('touchstart', handler, { passive: false });
  }

  function resetForNewMatch() {
    scoreHome = 0; scoreAway = 0;
    lastScorer = null;
    scoreHomeEl.textContent = 0;
    scoreAwayEl.textContent = 0;
    stats = { home: emptyTeamStats(), away: emptyTeamStats() };
    matchStartTime = performance.now();
    endscreenEl.classList.remove('visible');
    kickoff();
    startCountdown();
  }

  // After a match ends the user goes BACK to the intro menu (not
  // straight into another match). From there they can start again.
  function returnToIntro() {
    scoreHome = 0; scoreAway = 0;
    lastScorer = null;
    scoreHomeEl.textContent = 0;
    scoreAwayEl.textContent = 0;
    stats = { home: emptyTeamStats(), away: emptyTeamStats() };
    matchStartTime = null;
    window._matchEnded = false;
    timerEl.textContent = '02:00';
    endscreenEl.classList.remove('visible');
    // Reset squad so user starts as striker next match
    setupPlayers();
    kickoff();
    showIntro();
  }

  // ============================================================
  // INTRO / STATS VIEW
  // ============================================================
  function showIntro() {
    gameState = 'intro';
    const history = loadHistory();
    const historyCount = history.length;
    introEl.innerHTML = `
      <h1>FLICK SOCCER</h1>
      <div class="tagline">4v4 mobile arcade soccer</div>

      <div class="controls">
        <h3>Controls</h3>
        <div class="control-row"><span class="icon">LEFT ½</span><span class="desc">Drag to move. Push hard past the edge to sprint (drains stamina).</span></div>
        <div class="control-row"><span class="icon">RIGHT ½</span><span class="desc">Flick zone — where you pass or shoot.</span></div>
        <div class="control-row"><span class="icon">SWIPE</span><span class="desc"><b>Forward swipe</b> = pass. Targets the swipe direction, gentle.</span></div>
        <div class="control-row"><span class="icon">PULL+FLICK</span><span class="desc"><b>Pull back then flick forward</b> = shot. More power. Curved sweeps add spin.</span></div>
        <div class="control-row"><span class="icon">LOB</span><span class="desc">Tap the LOB button (right edge) to make your next kick a lofted lob.</span></div>
        <div class="control-row"><span class="icon">BUMP</span><span class="desc">Run into the ball carrier to tackle and steal. Works from any angle.</span></div>
      </div>

      <div class="controls">
        <h3>Match</h3>
        <div class="control-row"><span class="icon">2:00</span><span class="desc">2-minute match. Team with most goals wins.</span></div>
        <div class="control-row"><span class="icon">KICKOFF</span><span class="desc">After a goal, the conceding team restarts with the ball.</span></div>
      </div>

      <div class="buttons">
        <button class="btn-start" id="introStart">START GAME</button>
        <button class="btn-stats" id="introStats">VIEW STATS ${historyCount ? `(${historyCount})` : ''}</button>
      </div>
    `;
    introEl.classList.add('visible');
    const startBtn = document.getElementById('introStart');
    const statsBtn = document.getElementById('introStats');
    const startHandler = (e) => { if (e) e.preventDefault(); beginMatchFromIntro(); };
    const statsHandler = (e) => { if (e) e.preventDefault(); showStatsView(); };
    startBtn.addEventListener('click', startHandler);
    startBtn.addEventListener('touchstart', startHandler, { passive: false });
    statsBtn.addEventListener('click', statsHandler);
    statsBtn.addEventListener('touchstart', statsHandler, { passive: false });
  }

  function beginMatchFromIntro() {
    introEl.classList.remove('visible');
    matchStartTime = performance.now();
    startCountdown();
  }

  function showStatsView() {
    const history = loadHistory();
    let html = `<div class="stats-title">Stats History</div>`;
    if (history.length === 0) {
      html += `<div class="stats-empty">No past matches yet.</div>`;
    } else {
      html += `<div class="stats-list">`;
      for (const r of history) {
        const d = new Date(r.ts);
        const when = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' · ' +
                     d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        const total = r.home.possessionFrames + r.away.possessionFrames;
        const hp = total ? Math.round(r.home.possessionFrames / total * 100) : 50;
        const ap = 100 - hp;
        const result = r.scoreHome > r.scoreAway ? 'W' : r.scoreHome < r.scoreAway ? 'L' : 'D';
        html += `
          <div class="match-card">
            <div class="match-head">
              <span class="match-date">${when}</span>
              <span class="match-result ${result}">${result}</span>
              <span class="match-score">
                <span class="home">${r.scoreHome}</span><span class="dash">–</span><span class="away">${r.scoreAway}</span>
              </span>
            </div>
            <div class="match-stats">
              <span class="k">Shots</span>
              <span class="v-h">${r.home.shots}</span>
              <span class="v-d">–</span>
              <span class="v-a">${r.away.shots}</span>
              <span class="k" style="text-align:right">&nbsp;</span>

              <span class="k">SoG</span>
              <span class="v-h">${r.home.shotsOnGoal}</span>
              <span class="v-d">–</span>
              <span class="v-a">${r.away.shotsOnGoal}</span>
              <span class="k" style="text-align:right">&nbsp;</span>

              <span class="k">Tackles</span>
              <span class="v-h">${r.home.tackles}</span>
              <span class="v-d">–</span>
              <span class="v-a">${r.away.tackles}</span>
              <span class="k" style="text-align:right">&nbsp;</span>

              <span class="k">Possession</span>
              <span class="v-h">${hp}%</span>
              <span class="v-d">–</span>
              <span class="v-a">${ap}%</span>
              <span class="k" style="text-align:right">&nbsp;</span>
            </div>
          </div>
        `;
      }
      html += `</div>`;
    }
    html += `
      <div class="buttons" style="margin-top:18px">
        <button class="btn-stats" id="statsBack">BACK</button>
      </div>
    `;
    introEl.innerHTML = html;
    const backBtn = document.getElementById('statsBack');
    const backHandler = (e) => { if (e) e.preventDefault(); showIntro(); };
    backBtn.addEventListener('click', backHandler);
    backBtn.addEventListener('touchstart', backHandler, { passive: false });
  }

  // ============================================================
  // MAIN LOOP — fixed 60Hz physics, variable-rate render
  // Prevents high-refresh displays (120Hz+) from running the game at 2x
  // speed, and prevents frame jitter from visibly accelerating the sim.
  // ============================================================
  const FIXED_DT_MS = 1000 / 60;
  const MAX_TICKS_PER_FRAME = 6;
  let accumulator = 0;
  let lastFrameTime = null;

  function step() {
    if (gameState === 'ended' || gameState === 'intro') return; // frozen

    if (gameState === 'kickoff') {
      // Everyone frozen — waiting for the kickoff taker to play the ball
      updateParticles();
      if (flashMsg) { flashMsg.t++; if (flashMsg.t > 55) flashMsg = null; }
      return;
    }

    if (gameState === 'countdown') {
      countdownFrames--;
      updateCountdownDisplay();
      if (countdownFrames <= 0) {
        // Enter 'kickoff' state — everyone stays frozen until the ball
        // is played. performKickoffPass decides: user taker waits,
        // AI taker auto-passes and transitions straight to 'playing'.
        gameState = 'kickoff';
        countdownEl.classList.remove('visible');
        performKickoffPass();
      }
      // still animate particles/flash during countdown
      updateParticles();
      if (flashMsg) {
        flashMsg.t++;
        if (flashMsg.t > 55) flashMsg = null;
      }
      return;
    }

    if (gameState === 'goalPause') {
      countdownFrames--;
      updateParticles();
      if (flashMsg) {
        flashMsg.t++;
        if (flashMsg.t > 55) flashMsg = null;
      }
      if (countdownFrames <= 0) {
        kickoff();
        startCountdown();
      }
      return;
    }

    // playing
    updateTimer();

    // Slow-motion — instead of freezing, run physics at 50% speed for a
    // handful of frames after a tackle. Implemented by skipping every
    // other step during hitstop — smoother than a hard freeze.
    if (hitstopFrames > 0) {
      hitstopFrames--;
      hitstopAltFrame = !hitstopAltFrame;
      if (hitstopAltFrame) {
        updateParticles();
        if (flashMsg) { flashMsg.t++; if (flashMsg.t > 55) flashMsg = null; }
        return;
      }
    }

    smoothedBall.x += (ball.x - smoothedBall.x) * BALL_SMOOTH;
    smoothedBall.y += (ball.y - smoothedBall.y) * BALL_SMOOTH;
    updateUserPlayer();
    for (const p of players) updateAI(p);
    handleTackles();
    dribbleBall();
    updateBall();
    updateParticles();
    if (flashMsg) {
      flashMsg.t++;
      if (flashMsg.t > 55) flashMsg = null;
    }

    // Track possession (one frame of credit to whichever team holds the ball)
    if (ball.possessedBy) stats[ball.possessedBy.team].possessionFrames++;
  }

  // Kickoff — real soccer rule: the first kick can't go forward (toward
  // the opposing goal). USER takes their own kickoff; we just flag the
  // lock so any forward flick is rejected. AI auto-passes to a teammate
  // that's level or behind the taker.
  function performKickoffPass() {
    const taker = ball.possessedBy;
    if (!taker) return;
    if (taker.isUser) {
      // Lock in: user must play the ball sideways or back themselves
      kickoffLock = true;
      flashText('SIDEWAYS OR BACK', '#ffd84a');
      return;
    }
    // AI kickoff: auto-pass to nearest teammate that isn't forward of taker
    const isHomeTeam = taker.team === 'home';
    const aheadOfTaker = (m) => isHomeTeam ? (m.y < taker.y - 20) : (m.y > taker.y + 20);
    let target = null, tdist = Infinity;
    for (const mate of players) {
      if (mate === taker || mate.team !== taker.team || mate.role === 'keeper') continue;
      if (aheadOfTaker(mate)) continue; // skip forward teammates
      const d = Math.hypot(mate.x - taker.x, mate.y - taker.y);
      if (d < tdist) { tdist = d; target = mate; }
    }
    // Fallback to any teammate if none non-forward exists
    if (!target) {
      for (const mate of players) {
        if (mate === taker || mate.team !== taker.team || mate.role === 'keeper') continue;
        const d = Math.hypot(mate.x - taker.x, mate.y - taker.y);
        if (d < tdist) { tdist = d; target = mate; }
      }
    }
    if (!target) return;
    const dx = target.x - taker.x, dy = target.y - taker.y;
    const d = Math.hypot(dx, dy) || 1;
    const power = 3.4;
    ball.possessedBy = null;
    ball.x = taker.x + (dx/d) * (taker.r + ball.r + 2);
    ball.y = taker.y + (dy/d) * (taker.r + ball.r + 2);
    ball.vx = (dx/d) * power;
    ball.vy = (dy/d) * power;
    ball.vz = 0; ball.z = 0;
    ball.spin = 0;
    flickResolved = false;
    ball._lastKicker = taker;
    ball._kickCooldown = 30;
    ball._isShot = false;
    stats[taker.team].passes++;
    taker.kickAnimT = 0;
    taker.kickAnimDur = 10;
    taker.kickAnimDir = { x: dx/d, y: dy/d };
    // AI has played the ball — unfreeze the pitch
    if (gameState === 'kickoff') gameState = 'playing';
  }

  function startCountdown() {
    gameState = 'countdown';
    countdownFrames = COUNTDOWN_DURATION;
    countdownEl.classList.add('visible');
    updateCountdownDisplay();
  }

  function startGoalPause() {
    gameState = 'goalPause';
    countdownFrames = 90; // 1.5 seconds celebration, then countdown begins
    ball.vx = 0; ball.vy = 0; ball.spin = 0; ball.vz = 0; ball.z = 0;
    // Rotate user to a new position for the next possession. Keeper stays
    // as keeper; user cycles striker → ldef → rdef → striker.
    rotateUserPosition();
  }

  const USER_SLOT_ORDER = ['striker', 'ldef', 'rdef'];
  function rotateUserPosition() {
    if (!userPlayer || !userPlayer._slot) return;
    const currentIdx = USER_SLOT_ORDER.indexOf(userPlayer._slot);
    const nextIdx = (currentIdx + 1) % USER_SLOT_ORDER.length;
    const targetSlot = USER_SLOT_ORDER[nextIdx];
    if (targetSlot === userPlayer._slot) return;

    const swap = players.find(pp => pp.team === 'home' && pp._slot === targetSlot);
    if (!swap) return;

    // Swap home position, role, and slot between user and the occupant
    const t1 = swap.role, t2 = swap.homeX, t3 = swap.homeY, t4 = swap._slot;
    swap.role = userPlayer.role;
    swap.homeX = userPlayer.homeX;
    swap.homeY = userPlayer.homeY;
    swap._slot = userPlayer._slot;
    userPlayer.role = t1;
    userPlayer.homeX = t2;
    userPlayer.homeY = t3;
    userPlayer._slot = t4;

    const labels = { striker: 'STRIKER', ldef: 'LEFT BACK', rdef: 'RIGHT BACK' };
    showBanner('YOU\'RE MOVING TO', labels[targetSlot], '#ffd84a', 240);
  }

  function showBanner(title, subtitle, color, duration) {
    banner = { title, subtitle, color, duration, t: 0 };
  }

  function updateCountdownDisplay() {
    if (gameState !== 'countdown') return;
    // 3 → 2 → 1 → GO! over 180 frames
    const elapsed = COUNTDOWN_DURATION - countdownFrames;
    if (elapsed < 60) countdownEl.textContent = '3';
    else if (elapsed < 120) countdownEl.textContent = '2';
    else if (elapsed < 170) countdownEl.textContent = '1';
    else countdownEl.textContent = 'GO!';
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawPitch();
    for (const p of players) drawPlayer(p);
    drawBall();
    drawParticles();
    drawShockwaves();
    drawFlash();
    drawBanner();
    drawTouchControls();
  }

  function drawBanner() {
    if (!banner) return;
    banner.t++;
    if (banner.t >= banner.duration) { banner = null; return; }
    // Fade in over first 12 frames, hold, fade out over last 30
    const t = banner.t, d = banner.duration;
    let alpha = 1;
    if (t < 12) alpha = t / 12;
    else if (t > d - 30) alpha = Math.max(0, (d - t) / 30);

    ctx.globalAlpha = alpha;
    // Dark backing
    const bx = W/2, by = H * 0.42;
    const bw = W * 0.82, bh = 110;
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(bx - bw/2, by - bh/2, bw, bh);
    ctx.strokeStyle = banner.color;
    ctx.lineWidth = 3;
    ctx.strokeRect(bx - bw/2, by - bh/2, bw, bh);

    // Title ('YOU'RE MOVING TO')
    ctx.fillStyle = '#e5e5e5';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText(banner.title, bx, by - 22);
    // Subtitle (position name) in color
    ctx.fillStyle = banner.color;
    ctx.font = 'bold 34px sans-serif';
    ctx.fillText(banner.subtitle, bx, by + 18);

    ctx.globalAlpha = 1;
  }

  function loop(now) {
    if (lastFrameTime === null) lastFrameTime = now;
    const delta = Math.min(250, now - lastFrameTime);
    lastFrameTime = now;
    accumulator += delta;

    let ticks = 0;
    while (accumulator >= FIXED_DT_MS && ticks < MAX_TICKS_PER_FRAME) {
      step();
      accumulator -= FIXED_DT_MS;
      ticks++;
    }
    if (ticks === MAX_TICKS_PER_FRAME) accumulator = 0; // drop backlog on long hitches

    render();
    requestAnimationFrame(loop);
  }

  // Kick it off — show intro first, user starts the match from there
  setupPlayers();
  kickoff();
  showIntro();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
